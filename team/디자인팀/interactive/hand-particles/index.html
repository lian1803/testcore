<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand-Controlled 3D Particle System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0f;
            overflow: hidden;
            color: #fff;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #video-container {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 320px;
            height: 240px;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid rgba(102, 126, 234, 0.5);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            z-index: 100;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(15, 15, 25, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            min-width: 280px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            z-index: 100;
        }

        .controls h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            font-size: 13px;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 500;
        }

        .control-group input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
        }

        .control-group input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            border: none;
        }

        .value-display {
            float: right;
            color: #667eea;
            font-weight: 600;
            font-size: 13px;
        }

        .button-group {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        button {
            flex: 1;
            padding: 10px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(102, 126, 234, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        .status {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(15, 15, 25, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px 20px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.8);
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #10b981;
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.6);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .status.loading .status-indicator {
            background: #f59e0b;
        }

        .status.gesture-active .status-indicator {
            background: #ef4444;
            animation: pulse 0.5s infinite;
        }

        .gesture-info {
            position: fixed;
            top: 80px;
            left: 20px;
            background: rgba(239, 68, 68, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(239, 68, 68, 0.5);
            border-radius: 12px;
            padding: 16px 20px;
            font-size: 13px;
            color: #fca5a5;
            z-index: 100;
            display: none;
            font-weight: 600;
        }

        .gesture-info.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .info {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(15, 15, 25, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            z-index: 100;
            max-width: 320px;
        }

        .info span {
            color: #667eea;
            font-weight: 600;
        }

        .info strong {
            color: #fff;
        }
    </style>
</head>

<body>
    <div id="canvas-container"></div>

    <div id="video-container">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
    </div>

    <div class="status loading">
        <div class="status-indicator"></div>
        <span id="status-text">Initializing camera...</span>
    </div>

    <div class="gesture-info" id="gesture-info">
        🌀 PARTICLE ATTRACTION MODE
    </div>

    <div class="controls">
        <h2>Particle Controls</h2>

        <div class="control-group">
            <label>
                Particle Count
                <span class="value-display" id="count-value">15000</span>
            </label>
            <input type="range" id="particle-count" min="1000" max="50000" value="15000" step="1000">
        </div>

        <div class="control-group">
            <label>
                Particle Size
                <span class="value-display" id="size-value">2.5</span>
            </label>
            <input type="range" id="particle-size" min="0.5" max="5" value="2.5" step="0.1">
        </div>

        <div class="control-group">
            <label>
                Speed
                <span class="value-display" id="speed-value">1.2</span>
            </label>
            <input type="range" id="speed" min="0.1" max="3" value="1.2" step="0.1">
        </div>

        <div class="control-group">
            <label>
                Hand Influence
                <span class="value-display" id="influence-value">12</span>
            </label>
            <input type="range" id="hand-influence" min="0" max="30" value="12" step="1">
        </div>

        <div class="button-group">
            <button id="reset">Reset</button>
            <button id="animate-toggle">Pause</button>
        </div>
    </div>

    <div class="info">
        <strong>✋ Hand Gestures:</strong><br>
        • <span>One Hand</span>: Push particles away<br>
        • <span>Two Hands Together</span>: Attract particles to center<br>
        • <span>Spread Hands</span>: Normal interaction<br>
        <br>
        <strong>Controls:</strong> Scroll to zoom • Click & drag to rotate
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0f);
        scene.fog = new THREE.FogExp2(0x0a0a0f, 0.0008);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 50;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.enablePan = false;
        controls.minDistance = 20;
        controls.maxDistance = 200;

        let particleCount = 15000;
        let particleSize = 2.5;
        let speed = 1.2;
        let handInfluence = 12;
        let animating = true;

        let particles, particleGeometry, particleMaterial;
        let positions, velocities, originalPositions;

        let hands_data = [];
        let handDetected = false;
        let gestureMode = 'normal';
        let attractionPoint = new THREE.Vector3(0, 0, 0);

        function createParticles() {
            if (particles) {
                scene.remove(particles);
                particleGeometry.dispose();
                particleMaterial.dispose();
            }

            particleGeometry = new THREE.BufferGeometry();
            positions = new Float32Array(particleCount * 3);
            velocities = new Float32Array(particleCount * 3);
            originalPositions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);

            const radius = 40;

            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;

                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const r = radius * Math.cbrt(Math.random());

                positions[i3] = r * Math.sin(phi) * Math.cos(theta);
                positions[i3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                positions[i3 + 2] = r * Math.cos(phi);

                originalPositions[i3] = positions[i3];
                originalPositions[i3 + 1] = positions[i3 + 1];
                originalPositions[i3 + 2] = positions[i3 + 2];

                velocities[i3] = (Math.random() - 0.5) * 0.02;
                velocities[i3 + 1] = (Math.random() - 0.5) * 0.02;
                velocities[i3 + 2] = (Math.random() - 0.5) * 0.02;

                const hue = (Math.atan2(positions[i3 + 1], positions[i3]) + Math.PI) / (Math.PI * 2);
                const color = new THREE.Color().setHSL(0.6 + hue * 0.3, 0.8, 0.6);
                colors[i3] = color.r;
                colors[i3 + 1] = color.g;
                colors[i3 + 2] = color.b;
            }

            particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            particleGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            particleMaterial = new THREE.PointsMaterial({
                size: particleSize,
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            particles = new THREE.Points(particleGeometry, particleMaterial);
            scene.add(particles);
        }

        createParticles();

        const videoElement = document.getElementById('video');
        const canvasElement = document.getElementById('canvas');
        const canvasCtx = canvasElement.getContext('2d');

        const hands = new Hands({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults(onResults);

        function onResults(results) {
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                handDetected = true;
                hands_data = [];

                for (const landmarks of results.multiHandLandmarks) {
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, { color: '#667eea', lineWidth: 2 });
                    drawLandmarks(canvasCtx, landmarks, { color: '#764ba2', lineWidth: 1, radius: 3 });

                    const palmCenter = {
                        x: (landmarks[0].x + landmarks[5].x + landmarks[9].x + landmarks[13].x + landmarks[17].x) / 5,
                        y: (landmarks[0].y + landmarks[5].y + landmarks[9].y + landmarks[13].y + landmarks[17].y) / 5,
                        z: (landmarks[0].z + landmarks[5].z + landmarks[9].z + landmarks[13].z + landmarks[17].z) / 5
                    };

                    const handPos = new THREE.Vector3(
                        -(palmCenter.x - 0.5) * 120,
                        -(palmCenter.y - 0.5) * 90,
                        -palmCenter.z * 80
                    );

                    hands_data.push({
                        position: handPos,
                        landmarks: landmarks
                    });
                }

                if (hands_data.length === 2) {
                    const hand1 = hands_data[0].position;
                    const hand2 = hands_data[1].position;
                    const distance = hand1.distanceTo(hand2);

                    if (distance < 30) {
                        gestureMode = 'attract';
                        attractionPoint.copy(hand1).add(hand2).multiplyScalar(0.5);
                        document.getElementById('status-text').textContent = '🌀 Attraction Mode!';
                        document.querySelector('.status').classList.add('gesture-active');
                        document.getElementById('gesture-info').classList.add('active');
                    } else {
                        gestureMode = 'normal';
                        document.getElementById('status-text').textContent = `${hands_data.length} hand(s) detected`;
                        document.querySelector('.status').classList.remove('gesture-active');
                        document.getElementById('gesture-info').classList.remove('active');
                    }
                } else {
                    gestureMode = 'normal';
                    document.getElementById('status-text').textContent = `${hands_data.length} hand(s) detected`;
                    document.querySelector('.status').classList.remove('gesture-active');
                    document.getElementById('gesture-info').classList.remove('active');
                }

                document.querySelector('.status').classList.remove('loading');
            } else {
                handDetected = false;
                hands_data = [];
                gestureMode = 'normal';
                document.getElementById('status-text').textContent = 'Waiting for hand...';
                document.querySelector('.status').classList.add('loading');
                document.querySelector('.status').classList.remove('gesture-active');
                document.getElementById('gesture-info').classList.remove('active');
            }

            canvasCtx.restore();
        }

        const cam = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 640,
            height: 480
        });
        cam.start();

        function animate() {
            requestAnimationFrame(animate);

            if (animating) {
                const positions = particleGeometry.attributes.position.array;

                for (let i = 0; i < particleCount; i++) {
                    const i3 = i * 3;

                    positions[i3] += velocities[i3] * speed;
                    positions[i3 + 1] += velocities[i3 + 1] * speed;
                    positions[i3 + 2] += velocities[i3 + 2] * speed;

                    if (gestureMode === 'attract' && handDetected) {
                        const dx = attractionPoint.x - positions[i3];
                        const dy = attractionPoint.y - positions[i3 + 1];
                        const dz = attractionPoint.z - positions[i3 + 2];
                        const distance = Math.sqrt(dx * dx + dy * dy + dz * dz);

                        if (distance > 1) {
                            const attractForce = 0.02 * (handInfluence / 10);
                            velocities[i3] += (dx / distance) * attractForce;
                            velocities[i3 + 1] += (dy / distance) * attractForce;
                            velocities[i3 + 2] += (dz / distance) * attractForce;
                        }
                    } else if (handDetected) {
                        for (const hand of hands_data) {
                            const dx = positions[i3] - hand.position.x;
                            const dy = positions[i3 + 1] - hand.position.y;
                            const dz = positions[i3 + 2] - hand.position.z;
                            const distance = Math.sqrt(dx * dx + dy * dy + dz * dz);

                            if (distance < 50) {
                                const force = (50 - distance) / 50;
                                const pushStrength = 0.02 * handInfluence;
                                velocities[i3] += (dx / distance) * force * pushStrength;
                                velocities[i3 + 1] += (dy / distance) * force * pushStrength;
                                velocities[i3 + 2] += (dz / distance) * force * pushStrength;
                            }
                        }
                    }

                    const returnStrength = gestureMode === 'attract' ? 0.0005 : 0.001;
                    velocities[i3] += (originalPositions[i3] - positions[i3]) * returnStrength;
                    velocities[i3 + 1] += (originalPositions[i3 + 1] - positions[i3 + 1]) * returnStrength;
                    velocities[i3 + 2] += (originalPositions[i3 + 2] - positions[i3 + 2]) * returnStrength;

                    const dampingFactor = gestureMode === 'attract' ? 0.95 : 0.98;
                    velocities[i3] *= dampingFactor;
                    velocities[i3 + 1] *= dampingFactor;
                    velocities[i3 + 2] *= dampingFactor;
                }

                particleGeometry.attributes.position.needsUpdate = true;
                particles.rotation.y += 0.0005 * speed;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        document.getElementById('particle-count').addEventListener('input', (e) => {
            particleCount = parseInt(e.target.value);
            document.getElementById('count-value').textContent = particleCount;
            createParticles();
        });

        document.getElementById('particle-size').addEventListener('input', (e) => {
            particleSize = parseFloat(e.target.value);
            document.getElementById('size-value').textContent = particleSize.toFixed(1);
            particleMaterial.size = particleSize;
        });

        document.getElementById('speed').addEventListener('input', (e) => {
            speed = parseFloat(e.target.value);
            document.getElementById('speed-value').textContent = speed.toFixed(1);
        });

        document.getElementById('hand-influence').addEventListener('input', (e) => {
            handInfluence = parseFloat(e.target.value);
            document.getElementById('influence-value').textContent = handInfluence;
        });

        document.getElementById('reset').addEventListener('click', () => {
            createParticles();
            camera.position.set(0, 0, 50);
            controls.reset();
        });

        document.getElementById('animate-toggle').addEventListener('click', (e) => {
            animating = !animating;
            e.target.textContent = animating ? 'Pause' : 'Play';
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
