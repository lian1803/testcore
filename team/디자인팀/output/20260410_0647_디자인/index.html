    /* ─── Reset & Base ─── */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0D0D0D;
      --primary: #C4A77D;
      --accent: #FFFFFF;
      --secondary: #8B7355;
      --font-heading: 'Cormorant Garamond', serif;
      --font-body: 'Montserrat', sans-serif;
    }

    html {
      scroll-behavior: auto;
    }

    body {
      background-color: var(--bg);
      color: var(--accent);
      font-family: var(--font-body);
      cursor: none;
      overflow-x: hidden;
    }

    /* ─── Custom Cursor ─── */
    #cursor-dot {
      position: fixed;
      top: 0;
      left: 0;
      width: 6px;
      height: 6px;
      background: var(--primary);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.08s ease, background 0.2s ease;
      will-change: transform;
    }

    #cursor-ring {
      position: fixed;
      top: 0;
      left: 0;
      width: 36px;
      height: 36px;
      border: 1px solid rgba(196, 167, 125, 0.6);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: transform 0.18s ease, width 0.3s ease, height 0.3s ease, border-color 0.3s ease;
      will-change: transform;
    }

    body:has(a:hover) #cursor-ring,
    body:has(button:hover) #cursor-ring {
      width: 56px;
      height: 56px;
      border-color: var(--primary);
    }

    /* ─── WebGL Canvas ─── */
    #shader-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      display: block;
    }

    /* ─── Navigation ─── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: clamp(1.2rem, 3vw, 2rem) clamp(1.5rem, 6vw, 5rem);
      mix-blend-mode: normal;
    }

    nav::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(13,13,13,0.7) 0%, transparent 100%);
      pointer-events: none;
    }

<script>
(function () {
  'use strict';

  /* ============================================================
     0. UTILITY
  ============================================================ */
  const qs  = (sel, ctx = document) => ctx.querySelector(sel);
  const qsa = (sel, ctx = document) => [...ctx.querySelectorAll(sel)];

  /* ============================================================
     1. LENIS SMOOTH SCROLL
  ============================================================ */
  function initLenis() {
    if (typeof Lenis === 'undefined') {
      console.warn('Lenis not found – skipping smooth scroll');
      return null;
    }
    const lenis = new Lenis({
      duration: 1.2,
      easing: t => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
      smooth: true,
    });
    function raf(time) {
      lenis.raf(time);
      requestAnimationFrame(raf);
    }
    requestAnimationFrame(raf);
    return lenis;
  }

  /* ============================================================
     2. WEBGL – LIQUID CHROME
  ============================================================ */
  function initWebGL() {
    /* ── canvas setup ── */
    let canvas = qs('#shader-canvas');
    if (!canvas) {
      canvas = document.createElement('canvas');
      canvas.id = 'shader-canvas';
      Object.assign(canvas.style, {
        position : 'fixed',
        top      : '0',
        left     : '0',
        width    : '100%',
        height   : '100%',
        zIndex   : '-1',
        pointerEvents: 'none',
      });
      document.body.prepend(canvas);
    }

    const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
    if (!gl) { console.error('WebGL not supported'); return; }

    /* ── shaders ── */
    const VS = `
      attribute vec2 position;
      attribute vec2 uv;
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = vec4(position, 0.0, 1.0);
      }
    `;

    const FS = `
      precision highp float;
      uniform float uTime;
      uniform vec3  uResolution;
      uniform vec3  uBaseColor;
      uniform float uAmplitude;
      uniform float uFrequencyX;
      uniform float uFrequencyY;
      uniform vec2  uMouse;
      varying vec2  vUv;

      vec4 renderImage(vec2 uvCoord) {
        vec2 fragCoord = uvCoord * uResolution.xy;
        vec2 uv = (2.0 * fragCoord - uResolution.xy) / min(uResolution.x, uResolution.y);

        for (float i = 1.0; i < 10.0; i++) {
          uv.x += uAmplitude / i * cos(i * uFrequencyX * uv.y + uTime + uMouse.x * 3.14159);
          uv.y += uAmplitude / i * cos(i * uFrequencyY * uv.x + uTime + uMouse.y * 3.14159);
        }

        vec2  diff   = uvCoord - uMouse;
        float dist   = length(diff);
        float falloff= exp(-dist * 20.0);
        float ripple = sin(10.0 * dist - uTime * 2.0) * 0.03;
        uv += (diff / (dist + 0.0001)) * ripple * falloff;

        vec3 color = uBaseColor / abs(sin(uTime - uv.y - uv.x));
        return vec4(color, 1.0);
      }

      void main() {
        vec4 col    = vec4(0.0);
        int  samples = 0;
        for (int i = -1; i <= 1; i++) {
          for (int j = -1; j <= 1; j++) {
            vec2 offset = vec2(float(i), float(j)) * (1.0 / min(uResolution.x, uResolution.y));
            col += renderImage(vUv + offset);
            samples++;
          }
        }
        gl_FragColor = col / float(samples);
      }
    `;

    /* ── compile helpers ── */
    function compileShader(type, src) {
      const s = gl.createShader(type);
      gl.shaderSource(s, src);
      gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
        console.error('Shader compile error:', gl.getShaderInfoLog(s));
        gl.deleteShader(s);
        return null;
      }
      return s;
    }

    const vs  = compileShader(gl.VERTEX_SHADER,   VS);
    const fs  = compileShader(gl.FRAGMENT_SHADER, FS);
    const prog = gl.createProgram();
    gl.attachShader(prog, vs);
    gl.attachShader(prog, fs);
    gl.linkProgram(prog);
    if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
      console.error('Program link error:', gl.getProgramInfoLog(prog));
      return;
    }
    gl.useProgram(prog);

    /* ── full-screen quad ── */
    const positions = new Float32Array([-1,-1, 1,-1, -1,1, 1,1]);
    const uvs       = new Float32Array([ 0, 0, 1, 0,  0,1, 1,1]);

    function makeBuffer(data, attr) {
      const buf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buf);
      gl.bufferData(gl.ARRAY_BUFFER, data, gl.STATIC_DRAW);
      const loc = gl.getAttribLocation(prog, attr);
      gl.enableVertexAttribArray(loc);
      gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
    }
    makeBuffer(positions, 'position');
    makeBuffer(uvs,       'uv');

    /* ── uniforms ── */
    const U = {
      uTime      : gl.getUniformLocation(prog, 'uTime'),
      uResolution: gl.getUniformLocation(prog, 'uResolution'),
      uBaseColor : gl.getUniformLocation(prog, 'uBaseColor'),
      uAmplitude : gl.getUniformLocation(prog, 'uAmplitude'),
      uFrequencyX: gl.getUniformLocation(prog, 'uFrequencyX'),
      uFrequencyY: gl.getUniformLocation(prog, 'uFrequencyY'),
      uMouse     : gl.getUniformLocation(prog, 'uMouse'),
    };

    /* Liquid Petal palette  bg=#0D0D0D, primary=#C4A77D */
    gl.uniform3f(U.uBaseColor,  0.082, 0.075, 0.055); // warm dark gold tint
    gl.uniform1f(U.uAmplitude,  0.35);
    gl.uniform1f(U.uFrequencyX, 1.8);
    gl.uniform1f(U.uFrequencyY, 1.8);

    /* ── mouse state ── */
    const mouse = { x: 0.5, y: 0.5, tx: 0.5, ty: 0.5 };
    window.addEventListener('mousemove', e => {
      mouse.tx = e.clientX / window.innerWidth;
      mouse.ty = 1.0 - e.clientY / window.innerHeight;
    });

    /* ── resize ── */
    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width  = window.innerWidth  * dpr;
      canvas.height = window.innerHeight * dpr;
      gl.viewport(0, 0, canvas.width, canvas.height);
    }
    window.addEventListener('resize', resize);
    resize();

    /* ── render loop ── */
    const startTime = performance.now();
    const lerp = (a, b, t) => a + (b - a) * t;

    function render() {
      mouse.x = lerp(mouse.x, mouse.tx, 0.06);
      mouse.y = lerp(mouse.y, mouse.ty, 0.06);

      const t = (performance.now() - startTime) * 0.001;
      gl.uniform1f(U.uTime,       t);
      gl.uniform3f(U.uResolution, canvas.width, canvas.height, 1.0);
      gl.uniform2f(U.uMouse,      mouse.x, mouse.y);

      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      requestAnimationFrame(render);
    }
    requestAnimationFrame(render);
  }

  /* ============================================================
     3. CUSTOM CURSOR  (BlobCursor — dot + ring)
  ============================================================ */
  function initCursor() {
    /* inject styles */
    const style = document.createElement('style');
    style.textContent = `
      *,*::before,*::after { cursor: none !important; }

      #cursor-dot,
      #cursor-ring {
        position: fixed;
        top: 0; left: 0;
        pointer-events: none;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        will-change: transform;
        z-index: 99999;
        mix-blend-mode: difference;
      }

      #cursor-dot {
        width: 8px; height: 8px;
        background: #C4A77D;
        transition: transform .15s ease, opacity .15s ease;
      }

      #cursor-ring {
        width: 44px; height: 44px;
        border: 1.5px solid rgba(196,167,125,.65);
        background: transparent;
        transition: transform .42s cubic-bezier(.16,1,.3,1),
                    width .3s ease, height .3s ease,
                    border-color .3s ease, opacity .3s ease;
      }

      body.cursor-hovering #cursor-dot  { transform: translate(-50%,-50%) scale(2.4); opacity:.5; }
      body.cursor-hovering #cursor-ring { width:70px; height:70px; border-color:#C4A77D; }
      body.cursor-hidden   #cursor-dot,
      body.cursor-hidden   #cursor-ring { opacity:0; }
    `;
    document.head.appendChild(style);

    const dot  = document.createElement('div'); dot.id  = 'cursor-dot';
    const ring = document.createElement('div'); ring.id = 'cursor-ring';
    document.body.append(dot, ring);

    let mx = -200, my = -200;
    let rx = -200, ry = -200;

    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
    document.addEventListener('mouseleave',() => document.body.classList.add('cursor-hidden'));
    document.addEventListener('mouseenter', () => document.body.classList.remove('cursor-hidden'));

    /* hover detection */
    const hoverSels = 'a,button,[data-cursor-hover],input,textarea,select,label';
    document.addEventListener('mouseover', e => {
      if (e.target.closest(hoverSels)) document.body.classList.add('cursor-hovering');
    });
    document.addEventListener('mouseout', e => {
      if (e.target.closest(hoverSels)) document.body.classList.remove('cursor-hovering');
    });

    const lerpVal = (a, b, t) => a + (b - a) * t;

    (function animateCursor() {
      dot.style.transform  = `translate(calc(${mx}px - 50%), calc(${my}px - 50%))`;

      rx = lerpVal(rx, mx, 0.12);
      ry = lerpVal(ry, my, 0.12);
      ring.style.transform = `translate(calc(${rx}px - 50%), calc(${ry}px - 50%))`;

      requestAnimationFrame(animateCursor);
    })();
  }

  /* ============================================================
     4. SPLIT TEXT – CHROME MASK EFFECT
     Each heading gets a canvas-texture mask so liquid chrome
     shows through the letterforms only.
  ============================================================ */
  function initSplitText() {
    const style = document.createElement('style');
    style.textContent = `
      /* ── word / char split helpers ── */
      .split-word {
        display: inline-block;
        overflow: hidden;
        vertical-align: bottom;
      }
      .split-char {
        display: inline-block;
        opacity: 0;
        transform: translateY(48px) rotate(4deg);
        transition: opacity .75s cubic-bezier(.16,1,.3,1),
                    transform .75s cubic-bezier(.16,1,.3,1);
        will-change: transform, opacity;
      }
      .split-char.visible {
        opacity: 1;
        transform: translateY(0) rotate(0deg);
      }

      /* ── chrome mask headings ── */
      .chrome-mask-text {
        position: relative;
        display: inline-block;
        color: transparent;
        background-clip: text;
        -webkit-background-clip: text;
        background-attachment: fixed;
        /* background-image set dynamically after canvas renders one frame */
        background-image: linear-gradient(135deg, #C4A77D 0%, #fff 40%, #C4A77D 70%, #a08060 100%);
      }

      /* animated shimmer fallback */
      @keyframes shimmer {
        0%   { background-position: -200% center; }
        100% { background-position:  200% center; }
      }
      .chrome-mask-text {
        background-size: 200% auto;
        animation: shimmer 4s linear infinite;
      }
    `;
    document.head.appendChild(style);

    /* ── split every [data-split] element into chars ── */
    const targets = qsa('[data-split], h1, h2, h3, .hero-title, .section-title');

    targets.forEach(el => {
      /* already processed */
      if (el.dataset.splitDone) return;
      el.dataset.splitDone = '1';

      /* add chrome-mask class if it's a heading */
      if (/^H[1-3]$/.test(el.tagName) || el.classList.contains('hero-title')) {
        el.classList.add('chrome-mask-text');
      }

      const rawText = el.innerText;
      el.innerHTML = '';

      rawText.split(' ').forEach((word, wi) => {
        const wordSpan = document.createElement('span');
        wordSpan.className = 'split-word';

        word.split('').forEach((ch, ci) => {
          const charSpan = document.createElement('span');
          charSpan.className = 'split-char';
          charSpan.textContent = ch === '' ? '\u00A0' : ch;
          /* staggered delay */
          charSpan.style.transitionDelay = `${(wi * 6 + ci) * 38}ms`;
          wordSpan.appendChild(charSpan);
        });

        el.appendChild(wordSpan);
        /* space between words */
        if (wi < rawText.split(' ').length - 1) {
          el.appendChild(document.createTextNode('\u00A0'));
        }
      });
    });

    /* ── IntersectionObserver to trigger animations ── */
    const io = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        const chars = qsa('.split-char', entry.target);
        chars.forEach(c => c.classList.add('visible'));
        io.unobserve(entry.target);
      });
    }, { threshold: 0.15, rootMargin: '-60px 0px' });

    targets.forEach(el => io.observe(el));
  }

  /* ============================================================
     5. SCROLL FADE-UP  (generic .fade-up elements)
  ============================================================ */
  function initFadeUp() {
    const style = document.createElement('style');
    style.textContent = `
      .fade-up {
        opacity: 0;
        transform: translateY(56px);
        transition: opacity .9s cubic-bezier(.16,1,.3,1),
                    transform .9s cubic-bezier(.16,1,.3,1);
        will-change: transform, opacity;
      }
      .fade-up.visible {
        opacity: 1;
        transform: translateY(0);
      }
    `;
    document.head.appendChild(style);

    /* Auto-tag common content blocks if not already tagged */
    qsa('p, .card, .feature, figure, img, .cta-btn').forEach((el, i) => {
      if (!el.classList.contains('fade-up') && !el.closest('[data-split]')) {
        el.classList.add('fade-up');
        el.style.transitionDelay = `${(i % 4) * 80}ms`;
      }
    });

    const io = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        entry.target.classList.add('visible');
        io.unobserve(entry.target);
      });
    }, { threshold: 0.12, rootMargin: '-40px 0px' });

    qsa('.fade-up').forEach(el => io.observe(el));
  }

  /* ============================================================
     6. PETAL PARTICLE LAYER  (canvas overlay – CSS z-index: 0)
        Adds organic petal-shaped particles drifting upward
        to reinforce the "Liquid Petal" concept.
  ============================================================ */
  function initPetalParticles() {
    const canvas = document.createElement('canvas');
    Object.assign(canvas.style, {
      position     : 'fixed',
      top          : '0',
      left         : '0',
      width        : '100%',
      height       : '100%',
      zIndex       : '0',
      pointerEvents: 'none',
      opacity      : '0.18',
    });
    document.body.insertBefore(canvas, document.body.children[1]);

    const ctx = canvas.getContext('2d');
    const DPR = Math.min(window.devicePixelRatio || 1, 2);

    function resize() {
      canvas.width  = window.innerWidth  * DPR;
      canvas.height = window.innerHeight * DPR;
    }
    window.addEventListener('resize', resize);
    resize();

    /* petal drawing helper */
    function drawPetal(cx, cy, size, angle, alpha) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(cx * DPR, cy * DPR);
      ctx.rotate(angle);
      ctx.scale(size * DPR, size * DPR);
      ctx.beginPath();
      /* Bézier petal shape */
      ctx.moveTo(0, -1);
      ctx.bezierCurveTo( 0.6, -0.6,  0.6,  0.6, 0, 1);
      ctx.bezierCurveTo(-0.6,  0.6, -0.6, -0.6, 0,-1);
      ctx.closePath();
      const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, 1);
      grad.addColorStop(0,   'rgba(255,255,255,0.9)');
      grad.addColorStop(0.4, 'rgba(196,167,125,0.7)');
      grad.addColorStop(1,   'rgba(196,167,125,0)');
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.restore();
    }

    /* particle pool */
    const COUNT = 28;
    const petals = Array.from({ length: COUNT }, (_, i) => ({
      x     : Math.random() * window.innerWidth,
      y     : Math.random() * window.innerHeight + window.innerHeight,
      size  : 8 + Math.random() * 22,
      speed : 0.25 + Math.random() * 0.55,
      drift : (Math.random() - 0.5) * 0.35,
      angle : Math.random() * Math.PI * 2,
      spin  : (Math.random() - 0.5) * 0.012,
      alpha : 0.25 + Math.random() * 0.55,
    }));

    function animatePetals() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const W = window.innerWidth, H = window.innerHeight;

      petals.forEach(p => {
        drawPetal(p.x, p.y, p.size, p.angle, p.alpha);
        p.y     -= p.speed;
        p.x     += p.drift;
        p.angle += p.spin;
        if (p.y < -80) {
          p.y = H + 80;
          p.x = Math.random() * W;
        }
      });
      requestAnimationFrame(animatePetals);
    }
    requestAnimationFrame(animatePetals);
  }
