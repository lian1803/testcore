<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLEUR — Luxury Floristry</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Karla:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.45/bundled/lenis.min.js"></script>
<style>
  :root {
    --bg: #0A0908;
    --primary: #E8D5D5;
    --accent: #C9A9A9;
    --secondary: #F5E6E0;
    --text-light: #F5E6E0;
    --text-muted: #C9A9A9;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html { font-size: 16px; }

  body {
    background: var(--bg);
    color: var(--primary);
    font-family: 'Karla', sans-serif;
    font-weight: 400;
    overflow-x: hidden;
    cursor: none;
  }

  /* ─── CUSTOM CURSOR ─── */
  #cursor-dot {
    position: fixed;
    width: 8px; height: 8px;
    background: var(--primary);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.08s ease, background 0.3s;
  }

  #cursor-ring {
    position: fixed;
    width: 44px; height: 44px;
    border: 1px solid rgba(232,213,213,0.5);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: width 0.4s ease, height 0.4s ease, background 0.4s ease, border-color 0.4s ease;
  }

  #cursor-blob {
    position: fixed;
    width: 120px; height: 120px;
    background: radial-gradient(circle, rgba(232,213,213,0.08) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9997;
    transform: translate(-50%, -50%);
    filter: blur(20px);
  }

  body:hover #cursor-dot { opacity: 1; }

  a, button { cursor: none; }

  /* ─── NAV ─── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: clamp(1.2rem, 2.5vw, 2rem) clamp(1.5rem, 5vw, 5rem);
    mix-blend-mode: normal;
  }

  nav::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(10,9,8,0.7) 0%, transparent 100%);
    pointer-events: none;
  }

  .nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(1.4rem, 2.5vw, 1.8rem);
    letter-spacing: 0.3em;
    color: var(--primary);
    text-decoration: none;
    position: relative;
    z-index: 1;
  }

  .nav-links {
    display: flex;
    gap: clamp(1.5rem, 3vw, 3rem);
    list-style: none;
    position: relative;
    z-index: 1;
  }

  .nav-links a {
    font-family: 'Karla', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    text-decoration: none;
    transition: color 0.3s;
  }

  .nav-links a:hover { color: var(--primary); }

  .nav-cta {
    position: relative;
    z-index: 1;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--bg);
    background: var(--primary);
    padding: 0.65rem 1.6rem;
    text-decoration: none;
    transition: background 0.3s, color 0.3s;
  }

  .nav-cta:hover { background: var(--secondary); }

  /* ─── HERO ─── */
  #hero {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #liquid-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Flower mask overlay */
  .flower-mask {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    animation: maskReveal 3s ease 1.5s forwards;
  }

  @keyframes maskReveal {
    0% { opacity: 0; transform: scale(0.85); }
    100% { opacity: 1; transform: scale(1); }
  }

  .flower-svg {
    width: clamp(300px, 50vw, 600px);
    height: clamp(300px, 50vw, 600px);
    opacity: 0.12;
  }

  .hero-content {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 0 2rem;
  }

  .hero-eyebrow {
    font-family: 'Karla', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1.5rem;
    opacity: 0;
    animation: fadeUp 1s ease 0.5s forwards;
  }

  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(3.5rem, 10vw, 9rem);
    line-height: 0.95;
    color: var(--primary);
    letter-spacing: -0.02em;
    margin-bottom: 2rem;
    overflow: hidden;
  }

  .hero-title .word {
    display: inline-block;
    opacity: 0;
    transform: translateY(60px);
    transition: opacity 0.9s cubic-bezier(0.16, 1, 0.3, 1),
                transform 0.9s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .hero-title .word.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .hero-title em {
    font-style: italic;
    color: var(--secondary);
  }

  .hero-subtitle {
    font-family: 'Karla', sans-serif;
    font-size: clamp(0.8rem, 1.5vw, 1rem);
    letter-spacing: 0.12em;
    color: var(--accent);
    margin-bottom: 3rem;
    opacity: 0;
    animation: fadeUp 1s ease 1.8s forwards;
  }

  .hero-actions {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    align-items: center;
    opacity: 0;
    animation: fadeUp 1s ease 2.2s forwards;
  }

  .btn-primary {
    font-family: 'Karla', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--bg);
    background: var(--primary);
    padding: 1rem 2.5rem;
    text-decoration: none;
    border: 1px solid var(--primary);
    transition: background 0.4s, color 0.4s;
    display: inline-block;
  }

  .btn-primary:hover { background: transparent; color: var(--primary); }

  .btn-secondary {
    font-family: 'Karla', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid rgba(201,169,169,0.4);
    padding-bottom: 2px;
    transition: color 0.3s, border-color 0.3s;
  }

  .btn-secondary:hover { color: var(--primary); border-color: var(--primary); }

  .scroll-indicator {
    position: absolute;
    bottom: 2.5rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    opacity: 0;
    animation: fadeUp 1s ease 2.8s forwards;
    z-index: 10;
  }

  .scroll-indicator span {
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .scroll-line {
    width: 1px;
    height: 50px;
    background: linear-gradient(to bottom, var(--accent), transparent);
    animation: scrollPulse 2s ease-in-out infinite;
  }

  @keyframes scrollPulse {
    0%, 100% { transform: scaleY(1); opacity: 0.6; }
    50% { transform: scaleY(0.5); opacity: 1; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ─── SECTION BASE ─── */
  section {
    position: relative;
    z-index: 2;
  }

  .section-label {
    font-family: 'Karla', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1rem;
    display: block;
  }

  /* ─── COLLECTION SHOWCASE ─── */
  #collection {
    background: var(--bg);
    padding: clamp(6rem, 12vw, 14rem) clamp(1.5rem, 8vw, 10rem);
  }

  .collection-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: clamp(4rem, 7vw, 7rem);
  }

  .collection-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(2.5rem, 6vw, 5.5rem);
    line-height: 1.05;
    color: var(--primary);
  }

  .collection-title .word {
    display: inline-block;
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1),
                transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .collection-title .word.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .collection-desc {
    max-width: 300px;
    font-size: 0.85rem;
    line-height: 1.8;
    color: var(--accent);
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  .collection-desc.visible { opacity: 1; transform: translateY(0); }

  .collection-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: clamp(1rem, 2vw, 2rem);
  }

  .collection-card {
    position: relative;
    overflow: hidden;
    aspect-ratio: 3/4;
    background: #1a1614;
    opacity: 0;
    transform: translateY(50px);
    transition: opacity 0.9s ease, transform 0.9s ease;
  }

  .collection-card.visible { opacity: 1; transform: translateY(0); }

  .collection-card:nth-child(2) { margin-top: 3rem; transition-delay: 0.15s; }
  .collection-card:nth-child(3) { margin-top: 6rem; transition-delay: 0.3s; }

  .card-bg {
    position: absolute;
    inset: 0;
    transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .collection-card:hover .card-bg { transform: scale(1.06); }

  .card-bg-1 {
    background: radial-gradient(ellipse at 30% 40%, #C9A9A9 0%, #8a6a6a 40%, #3d2a2a 100%);
  }
  .card-bg-2 {
    background: radial-gradient(ellipse at 60% 30%, #E8D5D5 0%, #c4958c 40%, #4a2820 100%);
  }
  .card-bg-3 {
    background: radial-gradient(ellipse at 40% 60%, #F5E6E0 0%, #d4a898 40%, #5a3830 100%);
  }

  /* Decorative flower shape inside card */
  .card-flower {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
    width: 70%;
    height: 70%;
    opacity: 0.3;
    transition: opacity 0.5s;
  }

  .collection-card:hover .card-flower { opacity: 0.5; }

  .card-info {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 2rem 1.5rem;
    background: linear-gradient(to top, rgba(10,9,8,0.9) 0%, transparent 100%);
  }

  .card-name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(1.2rem, 2vw, 1.6rem);
    color: var(--primary);
    margin-bottom: 0.3rem;
  }

  .card-price {
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    color: var(--accent);
  }

  /* ─── SERVICE TIERS ─── */
  #services {
    background: #0f0d0c;
    padding: clamp(6rem, 12vw, 14rem) clamp(1.5rem, 8vw, 10rem);
  }

  .services-header {
    text-align: center;
    margin-bottom: clamp(5rem, 8vw, 9rem);
  }

  .services-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(2.5rem, 6vw, 5.5rem);
    color: var(--primary);
    margin-bottom: 1.5rem;
  }

  .services-title .word {
    display: inline-block;
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1),
                transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .services-title .word.visible { opacity: 1; transform: translateY(0); }

  .services-intro {
    font-size: 0.9rem;
    line-height: 1.9;
    color: var(--accent);
    max-width: 500px;
    margin: 0 auto;
    opacity: 0;
    transition: opacity 0.8s ease 0.3s;
  }

  .services-intro.visible { opacity: 1; }

  .services-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: clamp(1.5rem, 3vw, 3rem);
  }

  .service-card {
    border: 1px solid rgba(232,213,213,0.1);
    padding: clamp(2rem, 4vw, 3.5rem) clamp(1.5rem, 3vw, 2.5rem);
    position: relative;
    overflow: hidden;
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 0.8s ease, transform 0.8s ease, border-color 0.4s;
  }

  .service-card.visible { opacity: 1; transform: translateY(0); }
  .service-card:nth-child(2) { transition-delay: 0.15s; }
  .service-card:nth-child(3) { transition-delay: 0.3s; }

  .service-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(232,213,213,0.03) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.4s;
  }

  .service-card:hover { border-color: rgba(232,213,213,0.25); }
  .service-card:hover::before { opacity: 1; }

  .service-num {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    color: var(--accent);
    margin-bottom: 2rem;
    display: block;
  }

  .service-icon {
    width: 48px;
    height: 48px;
    margin-bottom: 2rem;
    opacity: 0.7;
  }

  .service-name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(1.5rem, 2.5vw, 2rem);
    color: var(--primary);
    margin-bottom: 1rem;
    line-height: 1.2;
  }

  .service-desc {
    font-size: 0.82rem;
    line-height: 1.9;
    color: var(--accent);
    margin-bottom: 2rem;
  }

  .service-link {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--primary);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    transition: gap 0.3s;
  }

  .service-link:hover { gap: 1rem; }

  .service-link::after {
    content: '→';
    font-size: 0.9rem;
  }

  /* ─── SUBSCRIPTION ─── */
  #subscription {
    background: var(--bg);
    padding: clamp(6rem, 12vw, 14rem) clamp(1.5rem, 8vw, 10rem);
    position: relative;
    overflow: hidden;
  }

  #subscription::before {
    content: '';
    position: absolute;
    top: -200px;
    left: -200px;
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, rgba(201,169,169,0.05) 0%, transparent 70%);
    pointer-events: none;
  }

  .subscription-inner {
    display: grid;
    grid-template-columns: 1fr 1.5fr;
    gap: clamp(4rem, 8vw, 10rem);
    align-items: start;
  }

  .subscription-left {
    position: sticky;
    top: 8rem;
  }

  .subscription-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(2.5rem, 5vw, 4.5rem);
    color: var(--primary);
    line-height: 1.1;
    margin-bottom: 2rem;
  }

  .subscription-title .word {
    display: inline-block;
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1),
                transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .subscription-title .word.visible { opacity: 1; transform: translateY(0); }

  .subscription-body {
    font-size: 0.85rem;
    line-height: 1.9;
    color: var(--accent);
    margin-bottom: 2.5rem;
    opacity: 0;
    transition: opacity 0.8s ease 0.4s;
  }

  .subscription-body.visible { opacity: 1; }

  .sub-ornament {
    width: 60px;
    height: 1px;
    background: linear-gradient(to right, var(--accent), transparent);
  }

  .plan-list {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .plan-card {
    border: 1px solid rgba(232,213,213,0.1);
    padding: 2.5rem;
    position: relative;
    transition: border-color 0.4s, background 0.4s;
    opacity: 0;
    transform: translateX(40px);
    transition: opacity 0.8s ease, transform 0.8s ease, border-color 0.4s, background 0.4s;
  }

  .plan-card.visible { opacity: 1; transform: translateX(0); }
  .plan-card:nth-child(2) { transition-delay: 0.15s; }
  .plan-card:nth-child(3) { transition-delay: 0.3s; }

  .plan-card:hover {
    border-color: rgba(232,213,213,0.3);
    background: rgba(232,213,213,0.02);
  }

  .plan-card.featured {
    border-color: rgba(232,213,213,0.25);
    background: rgba(232,213,213,0.03);
  }

  .plan-featured-badge {
    position: absolute;
    top: -1px;
    right: 2rem;
    background: var(--primary);
    color: var(--bg);
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 0.3rem 0.8rem;
  }

  .plan-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1.5rem;
  }

  .plan-name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 1.6rem;
    color: var(--primary);
  }

  .plan-price {
    text-align: right;
  }

  .plan-price-num {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 2rem;
    color: var(--primary);
    display: block;
  }

  .plan-price-period {
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    color: var(--accent);
  }

  .plan-features {
    list-style: none;
    margin-bottom: 2rem;
  }

  .plan-features li {
    font-size: 0.82rem;
    color: var(--accent);
    padding: 0.5rem 0;
    border-bottom: 1px solid rgba(232,213,213,0.06);
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }

  .plan-features li::before {
    content: '◇';
    font-size: 0.5rem;
    color: var(--accent);
    flex-shrink: 0;
  }

  .plan-cta {
    display: inline-block;
    font-family: 'Karla', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--bg);
    background: var(--primary);
    padding: 0.8rem 2rem;
    text-decoration: none;
    width: 100%;
    text-align: center;
    transition: background 0.3s, color 0.3s;
    border: 1px solid var(--primary);
  }

  .plan-cta:hover { background: transparent; color: var(--primary); }

  /* ─── CONTACT CONCIERGE ─── */
  #contact {
    background: #0f0d0c;
    padding: clamp(6rem, 12vw, 14rem) clamp(1.5rem, 8vw, 10rem);
  }

  .contact-inner {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: clamp(4rem, 8vw, 10rem);
    align-items: center;
  }

  .contact-left h2 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(2.5rem, 5vw, 4.5rem);
    color: var(--primary);
    line-height: 1.1;
    margin-bottom: 2rem;
  }

  .contact-left h2 .word {
    display: inline-block;
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1),
                transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .contact-left h2 .word.visible { opacity: 1; transform: translateY(0); }

  .contact-left p {
    font-size: 0.85rem;
    line-height: 1.9;
    color: var(--accent);
    margin-bottom: 3rem;
    opacity: 0;
    transition: opacity 0.8s ease 0.3s;
  }

  .contact-left p.visible { opacity: 1; }

  .contact-details {
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
    opacity: 0;
    transition: opacity 0.8s ease 0.5s;
  }

  .contact-details.visible { opacity: 1; }

  .contact-item {
    display: flex;
    gap: 1rem;
    align-items: flex-start;
  }

  .contact-item-label {
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent);
    min-width: 80px;
    padding-top: 2px;
  }

  .contact-item-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    color: var(--primary);
    font-weight: 300;
  }

  .contact-form {
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.8s ease 0.2s, transform 0.8s ease 0.2s;
  }

  .contact-form.visible { opacity: 1; transform: translateY(0); }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .form-group label {
    font-size: 0.65rem;
