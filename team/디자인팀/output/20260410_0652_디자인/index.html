    :root {

      --primary: #C4A77D;

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

      width: 100vw; height: 100vh;

      pointer-events: none;

      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: opacity 0.2s;
    }

    #cursor-ring {
      position: fixed;
      width: 32px; height: 32px;
      border: 1px solid var(--primary);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      opacity: 0.6;
      transition: width 0.3s, height 0.3s, opacity 0.3s;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem clamp(1.5rem, 5vw, 4rem);
      background: linear-gradient(to bottom, rgba(13,5,8,0.85) 0%, transparent 100%);
    }

    .nav-logo {
      font-family: var(--font-heading);
      font-size: clamp(1.2rem, 2.5vw, 1.6rem);
      font-weight: 300;
      letter-spacing: 0.2em;
      color: var(--primary);
      text-decoration: none;
    }

    .nav-logo span { color: var(--accent); }

    .nav-links {
      display: flex;
      gap: clamp(1.5rem, 3vw, 2.5rem);
      list-style: none;
    }

    .nav-links a {
      font-family: var(--font-body);
      font-size: clamp(0.7rem, 1vw, 0.8rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--primary);
      text-decoration: none;
      opacity: 0.8;
      transition: opacity 0.3s;
    }

    .nav-links a:hover { opacity: 1; }

    .nav-cta {
      font-family: var(--font-body);
      font-size: clamp(0.65rem, 1vw, 0.75rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--bg);
      background: var(--primary);
      border: none;
      padding: 0.7rem 1.6rem;
      cursor: none;
      transition: background 0.3s, transform 0.2s;
    }

    .nav-cta:hover { background: var(--accent); transform: scale(1.02); }

    /* ── HERO ── */
    #hero {
      position: relative;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }

    #silk-curtain-left,
    #silk-curtain-right {
      position: absolute;
      top: 0; bottom: 0;
      width: 50%;
      background: linear-gradient(to right, var(--secondary) 0%, rgba(42,22,32,0.85) 100%);
      z-index: 5;
      transform-origin: left center;
    }

    #silk-curtain-right {
      right: 0; left: auto;
      background: linear-gradient(to left, var(--secondary) 0%, rgba(42,22,32,0.85) 100%);
      transform-origin: right center;
    }

    #hero-canvas-wrapper {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    canvas#rose-canvas {
      width: min(520px, 80vw);
      height: min(520px, 80vw);
    }

    .hero-content {
      position: relative;
      z-index: 6;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      pointer-events: none;
    }

    .hero-eyebrow {
      font-family: var(--font-body);
      font-size: clamp(0.6rem, 1vw, 0.72rem);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0;
    }

    .hero-title {
      font-family: var(--font-heading);
      font-size: clamp(3.5rem, 10vw, 8rem);
      font-weight: 300;
      line-height: 0.95;
      letter-spacing: 0.05em;
      color: var(--primary);
      opacity: 0;

      font-weight: 300;
      letter-spacing: 0.3em;
      color: var(--accent);
      filter: blur(12px);
      opacity: 0;
      text-transform: uppercase;
    }

    /* ── PETAL PARTICLES ── */
    #petal-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    /* ── SECTION BASE ── */
    section {
      position: relative;
      padding: clamp(5rem, 12vh, 9rem) clamp(1.5rem, 8vw, 8rem);

      color: var(--accent);

      opacity: 0;

      letter-spacing: 0.08em;
    }

    .bouquet-tag {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: rgba(232,180,184,0.12);
      border: 1px solid rgba(232,180,184,0.3);
      color: var(--accent);
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.3rem 0.7rem;
    }

      align-items: center;

      overflow: hidden;

      margin-top: 2rem;

      font-size: clamp(0.8rem, 1.2vw, 0.9rem);

      margin-top: 0.1rem;
      font-size: 0.7rem;
    }

    .plan-tier {

      color: var(--accent);

    }

    .plan-name {
      font-family: var(--font-heading);
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      font-weight: 300;
      color: var(--primary);
      margin-bottom: 0.5rem;
    }

    .plan-price {
      font-family: var(--font-heading);
      font-size: clamp(2rem, 4vw, 3rem);
      color: var(--accent);

      position: relative;
    }

    .plan-features li::before {
      content: '—';
      position: absolute;
      left: 0;
      color: var(--accent);
      opacity: 0.6;
    }

    /* ── ATELIER STORY ── */
    #atelier-story {
      background: linear-gradient(to bottom, transparent, rgba(42,22,32,0.25), transparent);
    }

      display: grid;

      gap: clamp(3rem, 6vw, 6rem);

    }

    }

    .atelier-signature {
      font-family: var(--font-heading);

    }

    .atelier-img-block svg { opacity: 0.15; }
