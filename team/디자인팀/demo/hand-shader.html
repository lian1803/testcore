<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hand + Shader — LIANCP Demo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@300;400&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#030303;color:#f0ede6;font-family:'Inter',sans-serif;overflow:hidden;height:100vh}
#gl{position:fixed;inset:0;z-index:0}
#gl canvas{width:100%!important;height:100%!important}
/* Grain */
body::after{content:'';position:fixed;inset:0;z-index:998;pointer-events:none;opacity:0.035;
background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
/* UI overlay */
.ui{position:fixed;z-index:999;pointer-events:none}
.title{top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.title h1{font-family:'Space Grotesk';font-size:clamp(2rem,6vw,4.5rem);font-weight:700;letter-spacing:-.03em;line-height:1;margin-bottom:1rem}
.title h1 .thin{font-weight:400;color:#706f6a}
.title p{font-size:.9rem;color:#706f6a;line-height:1.6}
/* Webcam preview */
#webcamBox{position:fixed;bottom:30px;right:30px;z-index:999;width:240px;border-radius:12px;overflow:hidden;border:1px solid rgba(196,163,90,0.2);opacity:0;transition:opacity .5s}
#webcamBox.active{opacity:1}
#webcam{width:100%;display:block;transform:scaleX(-1)}
#webcamBox .label{position:absolute;top:8px;left:10px;font-size:.65rem;color:#c4a35a;letter-spacing:.1em;text-transform:uppercase;background:rgba(3,3,3,.7);padding:2px 8px;border-radius:4px}
/* Start button */
#startBtn{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);z-index:999;
padding:12px 32px;background:#c4a35a;color:#030303;border:none;border-radius:8px;
font-family:'Space Grotesk';font-weight:600;font-size:.9rem;cursor:pointer;
transition:all .3s;pointer-events:all}
#startBtn:hover{background:#e6c99e;transform:translateX(-50%) translateY(-2px);box-shadow:0 10px 30px rgba(196,163,90,.2)}
#startBtn.hidden{opacity:0;pointer-events:none}
/* Status */
#status{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);z-index:999;
font-size:.75rem;color:#706f6a;letter-spacing:.05em;text-align:center;pointer-events:none}
/* Hand indicator */
#handDot{position:fixed;width:20px;height:20px;border:2px solid #c4a35a;border-radius:50%;
z-index:997;pointer-events:none;opacity:0;transition:opacity .3s;
box-shadow:0 0 20px rgba(196,163,90,.3)}
#handDot.active{opacity:1}
</style>
</head>
<body>
<div id="gl"></div>
<div id="handDot"></div>

<div class="ui title">
  <h1>Move your hand.<br><span class="thin">The liquid follows.</span></h1>
  <p>MediaPipe hand tracking + LiquidChrome GLSL shader</p>
</div>

<button id="startBtn">Start Camera</button>
<div id="status"></div>

<div id="webcamBox">
  <div class="label">Tracking</div>
  <video id="webcam" autoplay playsinline></video>
</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.min.js"></script>

<script>
// ============================================
// LIQUID CHROME SHADER (proven working code)
// ============================================
let mx = 0.5, my = 0.5;
let handActive = false;

(function(){
const container = document.getElementById('gl');
const cvs = document.createElement('canvas');
container.appendChild(cvs);
const gl = cvs.getContext('webgl2') || cvs.getContext('webgl');
if(!gl) return;

function resize(){ cvs.width=window.innerWidth; cvs.height=window.innerHeight; gl.viewport(0,0,cvs.width,cvs.height) }
resize(); window.addEventListener('resize', resize);

const vs = `attribute vec2 p;varying vec2 vUv;void main(){vUv=p*.5+.5;gl_Position=vec4(p,0,1);}`;
const fs = `precision highp float;
uniform float t; uniform vec2 r; uniform vec2 m; uniform float strength;
varying vec2 vUv;
void main(){
  vec2 uv = (2.*vUv*r - r) / min(r.x, r.y);
  for(float i=1.; i<8.; i++){
    uv.x += (0.3 * strength) / i * cos(i*3.*uv.y + t + m.x*3.14159);
    uv.y += (0.3 * strength) / i * cos(i*3.*uv.x + t + m.y*3.14159);
  }
  vec2 d = vUv - m; float dist = length(d);
  float fall = exp(-dist * 12.);
  float rip = sin(10.*dist - t*3.) * 0.05 * strength;
  uv += d/(dist+.001) * rip * fall;
  vec3 base = vec3(.06,.05,.04);
  vec3 col = base / abs(sin(t - uv.y - uv.x));
  col = pow(col, vec3(.85));
  col *= 1. - length(vUv-.5)*.5;
  gl_FragColor = vec4(col, 1);
}`;

function sh(src,type){ const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s); return s; }
const pg = gl.createProgram();
gl.attachShader(pg, sh(vs, gl.VERTEX_SHADER));
gl.attachShader(pg, sh(fs, gl.FRAGMENT_SHADER));
gl.linkProgram(pg); gl.useProgram(pg);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
const pL = gl.getAttribLocation(pg,'p');
gl.enableVertexAttribArray(pL);
gl.vertexAttribPointer(pL, 2, gl.FLOAT, false, 0, 0);

const tU = gl.getUniformLocation(pg,'t');
const rU = gl.getUniformLocation(pg,'r');
const mU = gl.getUniformLocation(pg,'m');
const sU = gl.getUniformLocation(pg,'strength');

// Mouse fallback
document.addEventListener('mousemove', e => {
  if(!handActive){
    mx = e.clientX / window.innerWidth;
    my = 1 - e.clientY / window.innerHeight;
  }
});

let currentStrength = 1.0;
let targetStrength = 1.0;

(function loop(time){
  requestAnimationFrame(loop);
  currentStrength += (targetStrength - currentStrength) * 0.05;
  gl.uniform1f(tU, time * 0.0002);
  gl.uniform2f(rU, cvs.width, cvs.height);
  gl.uniform2f(mU, mx, my);
  gl.uniform1f(sU, currentStrength);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
})(0);

// Expose strength control
window.setShaderStrength = function(s){ targetStrength = s; };
})();

// ============================================
// MEDIAPIPE HAND TRACKING
// ============================================
const startBtn = document.getElementById('startBtn');
const statusEl = document.getElementById('status');
const webcamEl = document.getElementById('webcam');
const webcamBox = document.getElementById('webcamBox');
const handDot = document.getElementById('handDot');

startBtn.addEventListener('click', async () => {
  startBtn.textContent = 'Loading model...';
  startBtn.style.pointerEvents = 'none';
  statusEl.textContent = 'Initializing MediaPipe...';

  try {
    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${file}`
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 0,  // 0 = lite (faster)
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    hands.onResults((results) => {
      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];
        // Index finger tip (landmark 8)
        const indexTip = landmarks[8];
        // Palm center (landmark 9)
        const palmCenter = landmarks[9];

        // Use palm center for smoother movement
        const hx = 1 - palmCenter.x;  // Mirror
        const hy = 1 - palmCenter.y;

        mx = hx;
        my = hy;
        handActive = true;

        // Show hand dot
        handDot.classList.add('active');
        handDot.style.left = (hx * window.innerWidth - 10) + 'px';
        handDot.style.top = ((1-hy) * window.innerHeight - 10) + 'px';

        // Finger spread = shader intensity
        const thumbTip = landmarks[4];
        const pinkyTip = landmarks[20];
        const spread = Math.hypot(thumbTip.x - pinkyTip.x, thumbTip.y - pinkyTip.y);
        window.setShaderStrength(0.5 + spread * 4);

        statusEl.textContent = `Tracking: x=${hx.toFixed(2)} y=${hy.toFixed(2)} | spread=${spread.toFixed(2)}`;
      } else {
        handActive = false;
        handDot.classList.remove('active');
        window.setShaderStrength(1.0);
        statusEl.textContent = 'No hand detected — using mouse';
      }
    });

    statusEl.textContent = 'Starting camera...';

    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
    webcamEl.srcObject = stream;
    await webcamEl.play();

    webcamBox.classList.add('active');
    startBtn.classList.add('hidden');
    statusEl.textContent = 'Camera ready — show your hand!';

    const camera = new Camera(webcamEl, {
      onFrame: async () => { await hands.send({ image: webcamEl }); },
      width: 640,
      height: 480
    });
    camera.start();

  } catch(err) {
    statusEl.textContent = 'Error: ' + err.message;
    startBtn.textContent = 'Retry';
    startBtn.style.pointerEvents = 'all';
    console.error(err);
  }
});
</script>
</body>
</html>
