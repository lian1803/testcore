<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Background</title>
<!-- 출처: https://gist.github.com/ui-velocity/116de68cd1f836de132d82afbd398bc3 -->
<!-- Three.js 기반 액체 효과 배경 — 색상 그라데이션 커스터마이징 가능 -->
<style>
body, html, #app { margin: 0; width: 100%; height: 100%; }
body { touch-action: none; }
#app { height: 100%; font-family: "Montserrat", serif; }
#canvas { position: fixed; top: 0; right: 0; bottom: 0; left: 0; overflow: hidden; }
</style>
</head>
<body>
<div id="app">
  <canvas id="canvas"></canvas>
</div>
<script type="module">
import LiquidBackground from 'https://cdn.jsdelivr.net/npm/threejs-components@0.0.27/build/backgrounds/liquid1.min.js'

const app = LiquidBackground(document.getElementById('canvas'))

const img = new Image();
img.crossOrigin = 'anonymous';
img.src = 'https://assets.codepen.io/33787/liquid.webp';
img.onload = () => {
  const cvs = document.createElement('canvas');
  cvs.width = img.width;
  cvs.height = img.height;
  const ctx = cvs.getContext('2d');
  ctx.drawImage(img, 0, 0);
  ctx.globalCompositeOperation = 'color';

  // 색상 커스터마이징 — 원하는 팔레트로 변경
  const gradient = ctx.createLinearGradient(0, 0, img.width, img.height);
  gradient.addColorStop(0, '#5b4c5c');
  gradient.addColorStop(0.25, '#9a8c97');
  gradient.addColorStop(0.5, '#a9757a');
  gradient.addColorStop(0.75, '#eaa18b');
  gradient.addColorStop(1, '#f5e4b7');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, img.width, img.height);
  app.loadImage(cvs.toDataURL());
};

app.liquidPlane.material.metalness = 0.75   // 금속감
app.liquidPlane.material.roughness = 0.25   // 거칠기
app.liquidPlane.uniforms.displacementScale.value = 5  // 액체 흐름 강도
app.setRain(false)
</script>
</body>
</html>
