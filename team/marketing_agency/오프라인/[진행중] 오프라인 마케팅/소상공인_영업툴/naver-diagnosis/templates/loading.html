{% extends "base.html" %}

{% block title %}진단 중... - 네이버 플레이스 진단{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-2xl shadow-lg p-12">
        <!-- Progress Circle -->
        <div class="flex justify-center mb-8">
            <div class="relative">
                <svg class="transform -rotate-90" width="200" height="200">
                    <circle
                        cx="100"
                        cy="100"
                        r="90"
                        stroke="#E5E7EB"
                        stroke-width="12"
                        fill="none"
                    />
                    <circle
                        id="progressCircle"
                        cx="100"
                        cy="100"
                        r="90"
                        stroke="#0066FF"
                        stroke-width="12"
                        fill="none"
                        stroke-linecap="round"
                        style="stroke-dasharray: 565.48; stroke-dashoffset: 565.48; transition: stroke-dashoffset 0.5s ease;"
                    />
                </svg>
                <div class="absolute inset-0 flex items-center justify-center">
                    <div class="text-center">
                        <div id="progressPercent" class="text-4xl font-bold text-gray-900">0%</div>
                        <div class="text-sm text-gray-500 mt-1">진행 중</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Status Text -->
        <div class="text-center mb-6">
            <h2 id="statusText" class="text-xl font-semibold text-gray-900 mb-2">
                진단을 준비하고 있습니다...
            </h2>
            <p class="text-gray-600">
                <svg class="inline w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <span id="estimatedTime">약 20초 소요</span>
            </p>
        </div>

        <!-- Progress Steps -->
        <div class="space-y-3">
            <div id="step-searching" class="step-item flex items-center p-3 rounded-lg bg-gray-50">
                <div class="step-icon w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center mr-3">
                    <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>
                <span class="text-gray-600">네이버 플레이스 검색</span>
            </div>

            <div id="step-crawling" class="step-item flex items-center p-3 rounded-lg bg-gray-50">
                <div class="step-icon w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center mr-3">
                    <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                    </svg>
                </div>
                <span class="text-gray-600">업체 정보 수집</span>
            </div>

            <div id="step-analyzing" class="step-item flex items-center p-3 rounded-lg bg-gray-50">
                <div class="step-icon w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center mr-3">
                    <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                    </svg>
                </div>
                <span class="text-gray-600">진단 점수 산출</span>
            </div>

            <div id="step-generating" class="step-item flex items-center p-3 rounded-lg bg-gray-50">
                <div class="step-icon w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center mr-3">
                    <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                    </svg>
                </div>
                <span class="text-gray-600">PPT 제안서 생성</span>
            </div>
        </div>

        <!-- Warning -->
        <div class="mt-8 p-4 bg-yellow-50 rounded-lg border border-yellow-200">
            <p class="text-sm text-yellow-800 text-center">
                <svg class="inline w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                </svg>
                이 페이지를 벗어나지 마세요
            </p>
        </div>
    </div>
</div>

<script src="/static/js/progress.js"></script>
<script>
    const jobId = "{{ job_id }}";
    startProgressPolling(jobId);
</script>
{% endblock %}
