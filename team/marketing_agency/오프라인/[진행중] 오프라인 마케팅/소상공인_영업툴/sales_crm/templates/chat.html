<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>채팅 | 영업 CRM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            background: white;
            border-bottom: 1px solid #efefef;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-info h2 {
            font-size: 18px;
            color: #333;
            margin-bottom: 4px;
        }

        .header-info p {
            font-size: 13px;
            color: #999;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .back-btn, .action-btn {
            padding: 8px 16px;
            background: #f0f0f0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .back-btn:hover, .action-btn:hover {
            background: #e0e0e0;
        }

        .action-btn.primary {
            background: #667eea;
            color: white;
        }

        .action-btn.primary:hover {
            background: #5568d3;
        }

        .action-btn.success {
            background: #50c878;
            color: white;
        }

        .action-btn.success:hover {
            background: #38a960;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: white;
        }

        .message-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 14px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message.ai {
            align-self: flex-start;
            background: #f0f0f0;
            color: #333;
        }

        .message.customer {
            align-self: flex-end;
            background: #667eea;
            color: white;
        }

        .response-options {
            align-self: flex-start;
            width: 100%;
            max-width: 100%;
        }

        .option-box {
            background: #f9f9f9;
            border: 1px solid #efefef;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .option-title {
            font-size: 12px;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .option-text {
            font-size: 14px;
            color: #333;
            line-height: 1.5;
            margin-bottom: 10px;
            white-space: pre-wrap;
        }

        .copy-btn {
            width: 100%;
            padding: 8px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            color: #666;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: #f0f0f0;
            border-color: #667eea;
            color: #667eea;
        }

        .copy-btn.copied {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .input-area {
            background: white;
            border-top: 1px solid #efefef;
            padding: 16px;
            display: flex;
            gap: 12px;
        }

        textarea {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            resize: none;
            max-height: 100px;
            transition: border-color 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .send-btn {
            padding: 12px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            align-self: flex-end;
        }

        .send-btn:hover {
            background: #5568d3;
            transform: translateY(-1px);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            text-align: center;
            color: #999;
            padding: 20px;
            font-size: 13px;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f0f0f0;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .message-box {
            background: #f9f9f9;
            border: 1px solid #efefef;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .message-box-title {
            font-size: 12px;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .message-content {
            background: white;
            padding: 12px;
            border-radius: 4px;
            font-size: 14px;
            color: #333;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
            margin-bottom: 12px;
            border-left: 3px solid #667eea;
        }

        .button-group {
            display: flex;
            gap: 8px;
        }

        .copy-send-btn {
            flex: 1;
            padding: 10px;
            background: white;
            border: 1px solid #667eea;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: #667eea;
            transition: all 0.2s;
        }

        .copy-send-btn:hover {
            background: #f0f0f0;
        }

        .copy-send-btn.copied {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .place-link {
            display: inline-block;
            padding: 8px 12px;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 4px;
            color: #667eea;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .place-link:hover {
            background: #e8f0ff;
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-info">
            <h2 id="businessName">로드 중...</h2>
            <div style="display: flex; gap: 8px; align-items: center;">
                <p id="businessPhone" style="cursor:pointer; color:#667eea; font-weight:600; margin: 0;" title="클릭하면 복사">-</p>
                <button id="phoneBtn" class="copy-btn" style="width: auto; padding: 6px 10px; margin: 0;" onclick="copyPhone()" title="전화번호 복사">
                    📋 복사
                </button>
            </div>
        </div>
        <div class="header-actions">
            <button class="action-btn primary" onclick="downloadPDF()">📋 제안서 PDF</button>
            <button class="action-btn" style="background: #e94560;" onclick="downloadPhoto()">📸 진단 사진</button>
            <button class="back-btn" onclick="history.back()">← 뒤로</button>
        </div>
    </div>

    <div class="chat-container">
        <div class="messages" id="messagesContainer">
            <div class="loading">
                <div class="spinner"></div>
                로드 중...
            </div>
        </div>

        <!-- 현재 멘트 발송 섹션 -->
        <div id="messageSection" style="display: none; padding: 16px; background: white; border-top: 1px solid #efefef;">
            <div class="message-box">
                <div class="message-box-title">📮 현재 단계 메시지</div>
                <div id="currentMessage" class="message-content"></div>
                <div class="button-group">
                    <button id="copyBtn" class="copy-send-btn" onclick="copyMessage()">
                        📋 복사
                    </button>
                    <button id="markSentBtn" class="copy-send-btn" style="background: #50c878; border-color: #50c878; color: white;" onclick="markSent()">
                        ✓ 발송 완료
                    </button>
                </div>
            </div>
        </div>

        <!-- 다음 메시지 생성 섹션 -->
        <div id="nextMessageSection" style="display: none; padding: 16px; background: white; border-top: 1px solid #efefef;">
            <button id="generateBtn" class="action-btn success" style="width: 100%;" onclick="generateNextMessage()">
                ⚡ 다음 메시지 생성
            </button>
        </div>

        <div class="input-area">
            <textarea
                id="customerInput"
                placeholder="고객 응답을 여기에 복붕하세요..."
                rows="3"
            ></textarea>
            <button class="send-btn" onclick="sendCustomerResponse()">
                ⚡ 전송
            </button>
        </div>
    </div>

    <script>
        // URL에서 business_id 추출
        const pathParts = window.location.pathname.split('/');
        const businessId = pathParts[pathParts.length - 1];
        let currentBusiness = null;

        const statusToStage = {
            '1차_발송_대기': 1,
            '1차_발송_완료': 1,
            '2차_생성': 2,
            '2차_발송_대기': 2,
            '2차_발송_완료': 2,
            '3차_생성': 3,
            '3차_발송_대기': 3,
            '3차_발송_완료': 3,
            '4차_생성': 4,
            '4차_발송_대기': 4,
        };

        function copyPhone() {
            const phone = document.getElementById('businessPhone').textContent;
            const btn = document.getElementById('phoneBtn');

            // placeholder 체크 — "진단-xxx"면 복사 안 됨
            if (!phone || phone === '-' || phone.startsWith('진단')) {
                alert('아직 전화번호가 없습니다');
                return;
            }

            navigator.clipboard.writeText(phone).then(() => {
                const origText = btn.textContent;
                const origBg = btn.style.background;

                btn.textContent = '✓ 복사됨!';
                btn.style.background = '#667eea';
                btn.style.color = 'white';

                setTimeout(() => {
                    btn.textContent = origText;
                    btn.style.background = origBg;
                    btn.style.color = '#666';
                }, 1500);
            }).catch(err => {
                alert('복사 실패: ' + err.message);
            });
        }

        async function downloadPDF() {
            try {
                const response = await fetch(`/api/business/${businessId}/pdf`);
                const data = await response.json();
                if (data.success) {
                    alert(data.message + '\n' + data.folder);
                } else {
                    alert('PDF 실패: ' + (data.error || ''));
                }
            } catch (err) {
                alert('PDF 실패: ' + err.message);
            }
        }

        async function downloadPhoto() {
            try {
                const response = await fetch(`/api/business/${businessId}/photo`);
                const data = await response.json();
                if (data.success) {
                    alert(data.message + '\n' + data.folder);
                } else {
                    alert('사진 실패: ' + (data.error || ''));
                }
            } catch (err) {
                alert('사진 실패: ' + err.message);
            }
        }

        async function loadChat() {
            try {
                // 업체 정보 로드
                const bizResponse = await fetch(`/api/business/${businessId}`);
                currentBusiness = await bizResponse.json();

                if (currentBusiness.id) {
                    document.getElementById('businessName').textContent = currentBusiness.name;
                    document.getElementById('businessPhone').textContent = currentBusiness.phone;
                }

                // 대화 기록 로드
                const chatResponse = await fetch(`/api/business/${businessId}/chat`);
                const messages = await chatResponse.json();

                displayMessages(messages);

                // 메시지 섹션 표시 여부 결정
                updateMessageSection();
            } catch (err) {
                console.error('로드 실패:', err);
                document.getElementById('messagesContainer').innerHTML = `
                    <div class="loading">⚠️ 로드 실패</div>
                `;
            }
        }

        function displayMessages(messages) {
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';

            if (!messages || messages.length === 0) {
                container.innerHTML = '<div class="loading">대화 시작...</div>';
                return;
            }

            messages.forEach((msg) => {
                const isAI = msg.speaker === 'AI';

                if (isAI) {
                    const groupEl = document.createElement('div');
                    groupEl.style.display = 'flex';
                    groupEl.style.gap = '12px';
                    groupEl.style.marginBottom = '20px';
                    groupEl.style.alignItems = 'flex-start';

                    const messageEl = document.createElement('div');
                    messageEl.className = 'message ai';
                    messageEl.style.flex = '1';
                    messageEl.textContent = msg.message;

                    const copyBtn = document.createElement('button');
                    copyBtn.className = 'copy-btn';
                    copyBtn.style.width = 'auto';
                    copyBtn.style.padding = '8px 12px';
                    copyBtn.style.whiteSpace = 'nowrap';
                    copyBtn.style.marginTop = '12px';
                    copyBtn.textContent = '📋 복사';
                    copyBtn.onclick = function(e) {
                        e.preventDefault();
                        copyToClipboard(copyBtn, msg.message);
                    };

                    groupEl.appendChild(messageEl);
                    groupEl.appendChild(copyBtn);
                    container.appendChild(groupEl);
                } else {
                    const messageEl = document.createElement('div');
                    messageEl.className = 'message customer';
                    messageEl.textContent = msg.message;
                    container.appendChild(messageEl);
                }
            });

            container.scrollTop = container.scrollHeight;
        }

        function copyToClipboard(btn, text) {
            navigator.clipboard.writeText(text).then(() => {
                btn.textContent = '✓ 복사됨!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = '📋 복사';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        async function updateMessageSection() {
            if (!currentBusiness) return;

            const status = currentBusiness.status;
            const stage = statusToStage[status];

            // 1차 발송 대기 상태면 현재 메시지 표시
            if (status === '1차_발송_대기') {
                const chatResponse = await fetch(`/api/business/${businessId}/chat`);
                const messages = await chatResponse.json();

                if (messages.length > 0) {
                    const firstMsg = messages[0].message;
                    document.getElementById('currentMessage').textContent = firstMsg;
                    document.getElementById('messageSection').style.display = 'block';
                    document.getElementById('nextMessageSection').style.display = 'none';
                }
            }
            // 2차~4차 생성 상태면 다음 메시지 생성 버튼 표시
            else if (status.includes('생성')) {
                document.getElementById('nextMessageSection').style.display = 'block';
                document.getElementById('messageSection').style.display = 'none';
            }
            // 2차~4차 발송 대기 상태면 발송 대기 메시지 표시
            else if (status.includes('발송_대기')) {
                try {
                    const msgResponse = await fetch(`/api/business/${businessId}/next-message`);
                    const msgData = await msgResponse.json();

                    if (msgData.success && msgData.message) {
                        document.getElementById('currentMessage').textContent = msgData.message;
                        document.getElementById('messageSection').style.display = 'block';
                        document.getElementById('nextMessageSection').style.display = 'none';
                    }
                } catch (err) {
                    console.error('메시지 로드 실패:', err);
                }
            }
            // 다른 상태는 메시지 섹션 숨김
            else {
                document.getElementById('messageSection').style.display = 'none';
                document.getElementById('nextMessageSection').style.display = 'none';
            }
        }

        function copyMessage() {
            const text = document.getElementById('currentMessage').textContent;
            copyToClipboard(document.getElementById('copyBtn'), text);
        }

        async function markSent() {
            try {
                document.getElementById('markSentBtn').disabled = true;
                document.getElementById('markSentBtn').textContent = '처리 중...';

                const response = await fetch(`/api/business/${businessId}/mark-sent`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || '처리 실패');
                }

                alert('발송 완료로 표시되었습니다!');
                await loadChat();
            } catch (err) {
                console.error('발송 완료 처리 실패:', err);
                alert('오류: ' + err.message);
            } finally {
                document.getElementById('markSentBtn').disabled = false;
                document.getElementById('markSentBtn').textContent = '✓ 발송 완료';
            }
        }

        async function generateNextMessage() {
            try {
                document.getElementById('generateBtn').disabled = true;
                document.getElementById('generateBtn').textContent = '생성 중...';

                const response = await fetch(`/api/business/${businessId}/next-message`);
                const data = await response.json();

                if (!response.ok || !data.success) {
                    throw new Error(data.error || data.info || '생성 실패');
                }

                if (!data.message) {
                    alert(data.info || '생성할 메시지가 없습니다');
                    return;
                }

                document.getElementById('currentMessage').textContent = data.message;
                document.getElementById('nextMessageSection').style.display = 'none';
                document.getElementById('messageSection').style.display = 'block';

                alert(`${data.message_num}차 메시지가 생성되었습니다!`);
            } catch (err) {
                console.error('메시지 생성 실패:', err);
                alert('오류: ' + err.message);
            } finally {
                document.getElementById('generateBtn').disabled = false;
                document.getElementById('generateBtn').textContent = '⚡ 다음 메시지 생성';
            }
        }

        async function sendCustomerResponse() {
            const input = document.getElementById('customerInput');
            const message = input.value.trim();

            if (!message) return;

            const sendBtn = document.querySelector('.send-btn');
            sendBtn.disabled = true;

            try {
                const response = await fetch(`/api/business/${businessId}/respond`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || '전송 실패');
                }

                input.value = '';
                await loadChat();
            } catch (err) {
                console.error('오류:', err);
                alert('오류: ' + err.message);
            } finally {
                sendBtn.disabled = false;
            }
        }

        // 엔터 키 처리
        document.getElementById('customerInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (e.shiftKey) {
                    return;
                } else {
                    e.preventDefault();
                    sendCustomerResponse();
                }
            }
        });

        // 페이지 로드
        loadChat();

        // 10초마다 갱신 (상태 변화 감지)
        setInterval(loadChat, 10000);
    </script>
</body>
</html>
