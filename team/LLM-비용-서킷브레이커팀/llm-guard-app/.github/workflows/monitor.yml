name: Site Monitor

on:
  schedule:
    # 매일 KST 09:00 (UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      url:
        description: '테스트할 사이트 URL (기본값: production)'
        required: false
        default: 'https://llm-guard-app.lian1803.workers.dev'

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MONITOR_URL: ${{ github.event.inputs.url || 'https://llm-guard-app.lian1803.workers.dev' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E monitor tests
        id: playwright
        run: npx playwright test e2e/monitor.spec.ts --reporter=list,json
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-results-${{ github.run_id }}
          path: e2e/results.json
          retention-days: 30

      - name: Parse test results
        if: steps.playwright.outcome == 'failure'
        id: parse
        run: |
          if [ -f e2e/results.json ]; then
            TOTAL=$(jq '.stats.expected // 0' e2e/results.json)
            FAILED=$(jq '.stats.unexpected // 0' e2e/results.json)
            FAILED_NAMES=$(jq -r '
              [.suites[].specs[] |
               select(.tests[].results[].status == "failed") |
               "- ❌ \(.title)"] | join("\n")
            ' e2e/results.json 2>/dev/null || echo "- (파싱 실패)")
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
            echo "failed=$FAILED" >> $GITHUB_OUTPUT
            # 멀티라인 output
            {
              echo "failed_names<<EOF"
              echo "$FAILED_NAMES"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          else
            echo "total=0" >> $GITHUB_OUTPUT
            echo "failed=unknown" >> $GITHUB_OUTPUT
            echo "failed_names=- (결과 파일 없음)" >> $GITHUB_OUTPUT
          fi

      - name: Create or update GitHub Issue on failure
        if: steps.playwright.outcome == 'failure'
        uses: actions/github-script@v7
        env:
          TOTAL: ${{ steps.parse.outputs.total }}
          FAILED: ${{ steps.parse.outputs.failed }}
          FAILED_NAMES: ${{ steps.parse.outputs.failed_names }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const total = process.env.TOTAL;
            const failed = process.env.FAILED;
            const failedNames = process.env.FAILED_NAMES;
            const monitorUrl = process.env.MONITOR_URL;
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const now = new Date().toISOString().replace('T', ' ').substring(0, 16);

            const summary = `전체 ${total}개 중 **${failed}개 실패**`;
            const body = [
              `## 🚨 사이트 모니터링 실패`,
              ``,
              `**감지 시각:** ${now} UTC`,
              `**대상 URL:** ${monitorUrl}`,
              `**결과:** ${summary}`,
              ``,
              `### 실패한 테스트`,
              failedNames,
              ``,
              `### 링크`,
              `- [GitHub Actions 실행 로그](${runUrl})`,
              ``,
              `> 자동 생성된 이슈입니다. 수동으로 닫아주세요.`,
            ].join('\n');

            // 기존 열린 monitor 이슈가 있으면 코멘트 추가, 없으면 새 이슈
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'monitor',
            });

            const openIssue = existing.data.find(i => i.title.includes('사이트 모니터링 실패'));
            if (openIssue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: openIssue.number,
                body: `### 재발 감지 (${now} UTC)\n\n${summary}\n\n${failedNames}\n\n[로그](${runUrl})`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🚨 사이트 모니터링 실패 (${now} UTC)`,
                body,
                labels: ['monitor', 'bug'],
              });
            }

      - name: Auto-fix failing tests with Claude
        if: steps.playwright.outcome == 'failure'
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            E2E 모니터 테스트가 실패했습니다.
            실패한 테스트: ${{ steps.parse.outputs.failed_names }}
            대상 URL: ${{ env.MONITOR_URL }}

            e2e/monitor.spec.ts 파일을 읽고 실패 원인을 분석하세요.
            관련 소스코드를 찾아서 버그를 수정하고 PR을 생성하세요.
            수정 후 monitor.spec.ts도 업데이트가 필요하면 함께 수정하세요.
          allowed_tools: "Bash,Read,Edit,Write,Glob,Grep"

      - name: Close monitor issue on success
        if: steps.playwright.outcome == 'success'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'monitor',
            });
            const openIssue = existing.data.find(i => i.title.includes('사이트 모니터링 실패'));
            if (openIssue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: openIssue.number,
                body: `✅ 모니터링 통과 — 자동 수정 성공으로 보입니다. 이슈를 닫습니다.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: openIssue.number,
                state: 'closed',
              });
            }

      - name: Report success
        if: steps.playwright.outcome == 'success'
        run: echo "✅ All monitor tests passed at $(date -u)"
