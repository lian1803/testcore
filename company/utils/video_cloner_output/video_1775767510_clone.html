```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio — Creative Designer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
<style>
  :root {
    --bg-hero: #FFFFFF;
    --bg-gradient-start: #A0D8FF;
    --bg-gradient-middle: #D0BFFF;
    --bg-gradient-end: #FFDDA0;
    --text-primary: #1A1A1A;
    --text-secondary: #333333;
    --accent-blue: #007BFF;
    --card-bg-glass: rgba(255, 255, 255, 0.4);
    --card-backdrop-blur: blur(10px);
    --font-heading: 'Montserrat', sans-serif;
    --font-body: 'Inter', sans-serif;
    --border-radius-lg: 16px;
    --spacing-lg: 4rem;
  }

  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    scroll-behavior: auto;
  }

  body {
    font-family: var(--font-body);
    background: var(--bg-hero);
    color: var(--text-secondary);
    overflow-x: hidden;
    cursor: none;
  }

  /* Custom Cursor */
  #cursor-dot {
    position: fixed;
    top: 0; left: 0;
    width: 8px; height: 8px;
    background: var(--text-primary);
    border-radius: 50%;
    pointer-events: none;
    z-index: 99999;
    transform: translate(-50%, -50%);
    transition: width 0.2s, height 0.2s, background 0.2s;
  }

  #cursor-ring {
    position: fixed;
    top: 0; left: 0;
    width: 44px; height: 44px;
    border: 2px solid rgba(26, 26, 26, 0.5);
    border-radius: 50%;
    pointer-events: none;
    z-index: 99998;
    transform: translate(-50%, -50%);
    transition: width 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                height 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                border-color 0.2s;
  }

  body.hovering #cursor-dot {
    width: 12px; height: 12px;
    background: var(--accent-blue);
  }

  body.hovering #cursor-ring {
    width: 60px; height: 60px;
    border-color: var(--accent-blue);
  }

  /* Page Wrapper */
  #page-wrapper {
    position: relative;
    width: 100%;
  }

  /* ========== HERO SECTION ========== */
  #hero {
    position: relative;
    width: 100%;
    min-height: 100vh;
    background: var(--bg-hero);
    display: grid;
    grid-template-columns: 1fr 1.5fr;
    overflow: hidden;
    z-index: 10;
  }

  .hero-left {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 4rem 3rem 4rem 6rem;
    position: relative;
    z-index: 5;
  }

  .hero-eyebrow {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: clamp(0.75rem, 1.2vw, 1rem);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #999;
    margin-bottom: 1.5rem;
  }

  .hero-name {
    font-family: var(--font-heading);
    font-weight: 900;
    font-size: clamp(2.5rem, 5vw, 5.5rem);
    line-height: 1;
    color: var(--text-primary);
    margin-bottom: 1rem;
    overflow: hidden;
  }

  .hero-name span {
    display: block;
    transform: translateY(100%);
    animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  .hero-name span:nth-child(2) { animation-delay: 0.1s; }

  @keyframes slideUp {
    to { transform: translateY(0); }
  }

  .hero-role {
    font-family: var(--font-body);
    font-size: clamp(1rem, 1.5vw, 1.2rem);
    color: #666;
    margin-bottom: 3rem;
    line-height: 1.6;
    max-width: 380px;
  }

  .hero-cta {
    display: flex;
    gap: 1rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .btn-primary {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 0.95rem;
    letter-spacing: 0.05em;
    padding: 1rem 2.5rem;
    background: var(--text-primary);
    color: #fff;
    border: none;
    border-radius: 50px;
    cursor: none;
    transition: background 0.3s, transform 0.2s;
  }

  .btn-primary:hover {
    background: #333;
    transform: translateY(-2px);
  }

  .btn-ghost {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 0.95rem;
    padding: 1rem 2.5rem;
    background: transparent;
    color: var(--text-primary);
    border: 2px solid var(--text-primary);
    border-radius: 50px;
    cursor: none;
    transition: all 0.3s;
  }

  .btn-ghost:hover {
    background: var(--text-primary);
    color: #fff;
  }

  /* Hero Right — Image + Overlaid Text */
  .hero-right {
    position: relative;
    overflow: hidden;
  }

  .hero-image-wrap {
    position: relative;
    width: 100%;
    height: 100%;
    min-height: 100vh;
  }

  .hero-image-bg {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #f0f0f0 0%, #e0e0e0 100%);
  }

  .hero-image-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* SVG silhouette placeholder */
  .hero-figure {
    width: 75%;
    height: 90%;
    object-fit: cover;
    filter: grayscale(100%) contrast(1.1);
    opacity: 0.9;
    position: relative;
    z-index: 2;
  }

  .hero-overlay-text {
    position: absolute;
    bottom: -1rem;
    left: -4rem;
    font-family: var(--font-heading);
    font-weight: 900;
    font-size: clamp(5rem, 14vw, 14rem);
    color: var(--text-primary);
    line-height: 1;
    z-index: 4;
    pointer-events: none;
    mix-blend-mode: multiply;
    will-change: transform;
    letter-spacing: -0.02em;
  }

  .hero-stats {
    position: absolute;
    bottom: 3rem;
    right: 3rem;
    display: flex;
    gap: 2.5rem;
    z-index: 6;
  }

  .stat-item {
    text-align: right;
  }

  .stat-number {
    font-family: var(--font-heading);
    font-weight: 900;
    font-size: clamp(1.8rem, 3vw, 2.8rem);
    color: var(--text-primary);
    line-height: 1;
  }

  .stat-label {
    font-family: var(--font-body);
    font-size: 0.8rem;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* Scroll indicator */
  .scroll-indicator {
    position: absolute;
    bottom: 2.5rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    cursor: none;
    z-index: 20;
    animation: fadeInUp 1s ease 1s both;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateX(-50%) translateY(20px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  .scroll-text {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #999;
    font-family: var(--font-body);
    font-weight: 600;
  }

  .scroll-line {
    width: 1px;
    height: 60px;
    background: linear-gradient(to bottom, #999, transparent);
    animation: scrollPulse 2s ease infinite;
  }

  @keyframes scrollPulse {
    0%, 100% { opacity: 1; transform: scaleY(1); }
    50% { opacity: 0.4; transform: scaleY(0.7); }
  }

  /* ========== 3D PAGE FLIP TRANSITION ========== */
  #transition-overlay {
    position: fixed;
    inset: 0;
    z-index: 1000;
    pointer-events: none;
    perspective: 2000px;
    perspective-origin: 50% 50%;
    display: none;
  }

  #flip-page {
    position: absolute;
    inset: 0;
    background: var(--bg-hero);
    transform-origin: top center;
    transform: rotateX(0deg);
    backface-visibility: hidden;
    will-change: transform;
  }

  /* ========== PORTFOLIO SECTION ========== */
  #portfolio {
    position: relative;
    min-height: 100vh;
    background: linear-gradient(to right bottom, var(--bg-gradient-start), var(--bg-gradient-middle), var(--bg-gradient-end));
    padding: 6rem 6rem;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  #portfolio.visible {
    opacity: 1;
  }

  /* Floating blobs */
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.5;
    pointer-events: none;
    animation: blobFloat 8s ease-in-out infinite;
  }

  .blob-1 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, #A0D8FF, transparent);
    top: -100px; left: -100px;
    animation-delay: 0s;
  }

  .blob-2 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, #D0BFFF, transparent);
    top: 30%; right: -150px;
    animation-delay: 2s;
  }

  .blob-3 {
    width: 350px; height: 350px;
    background: radial-gradient(circle, #FFDDA0, transparent);
    bottom: 10%; left: 20%;
    animation-delay: 4s;
  }

  @keyframes blobFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -20px) scale(1.05); }
    66% { transform: translate(-20px, 30px) scale(0.95); }
  }

  .portfolio-header {
    text-align: center;
    margin-bottom: 4rem;
    position: relative;
    z-index: 5;
  }

  .portfolio-eyebrow {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 0.8rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(26, 26, 26, 0.6);
    margin-bottom: 1rem;
  }

  .portfolio-title {
    font-family: var(--font-heading);
    font-weight: 900;
    font-size: clamp(3rem, 8vw, 8rem);
    color: var(--text-primary);
    line-height: 0.9;
    letter-spacing: -0.03em;
  }

  .portfolio-title .outline {
    -webkit-text-stroke: 2px var(--text-primary);
    color: transparent;
  }

  /* Portfolio Grid */
  .portfolio-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 1.5rem;
    position: relative;
    z-index: 5;
  }

  /* Portfolio Card */
  .portfolio-card {
    background: var(--card-bg-glass);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.6);
    border-radius: var(--border-radius-lg);
    overflow: hidden;
    cursor: none;
    transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                box-shadow 0.4s ease;
    transform: translateY(80px) rotateX(15deg);
    opacity: 0;
    will-change: transform;
    transform-style: preserve-3d;
    perspective: 800px;
  }

  .portfolio-card.animate-in {
    animation: cardSlideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  @keyframes cardSlideIn {
    to {
      transform: translateY(0) rotateX(0deg);
      opacity: 1;
    }
  }

  .portfolio-card:hover {
    transform: translateY(-8px) rotateX(2deg) rotateY(2deg) scale(1.03) !important;
    box-shadow: 0 40px 80px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(255,255,255,0.8);
    opacity: 1 !important;
  }

  .card-image {
    width: 100%;
    aspect-ratio: 16/10;
    overflow: hidden;
    position: relative;
  }

  .card-image-inner {
    width: 100%;
    height: 100%;
    transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  .portfolio-card:hover .card-image-inner {
    transform: scale(1.08);
  }

  .card-body {
    padding: 1.5rem;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  .portfolio-card.animate-in .card-body {
    animation: fadeInContent 0.4s ease 0.4s forwards;
  }

  @keyframes fadeInContent {
    to { opacity: 1; transform: translateY(0); }
  }

  .card-tag {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent-blue);
    margin-bottom: 0.5rem;
  }

  .card-title {
    font-family: var(--font-heading);
    font-weight: 900;
    font-size: clamp(1.1rem, 2vw, 1.5rem);
    color: var(--text-primary);
    margin-bottom: 0.5rem;
    line-height: 1.2;
  }

  .card-desc {
    font-size: 0.875rem;
    color: #555;
    line-height: 1.6;
    margin-bottom: 1.2rem;
  }

  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .card-year {
    font-size: 0.75rem;
    color: #888;
    font-weight: 600;
    letter-spacing: 0.05em;
  }

  .card-arrow {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--text-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.2s;
  }

  .portfolio-card:hover .card-arrow {
    background: var(--accent-blue);
    transform: rotate(45deg);
  }

  .card-arrow svg {
    width: 14px; height: 14px;
    fill: none;
    stroke: #fff;
    stroke-width: 2;
  }

  /* Featured card — spans 2 columns */
  .card-featured {
    grid-column: span 2;
  }

  .card-featured .card-image {
    aspect-ratio: 21/9;
  }

  /* ========== FLOATING SIDE PANEL ========== */
  #floating-panel {
    position: fixed;
    right: 2rem;
    top: 50%;
    transform: translateY(-50%) translateX(120px);
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    z-index: 500;
    transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }

  #floating-panel.visible {
    transform: translateY(-50%) translateX(0);
  }

  .panel-item {
    background: rgba(255, 255, 255, 0.5);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.7);
    border-radius: 12px;
    padding: 0.75rem 1rem;
    font-family: var(--font-body);
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-primary);
    cursor: none;
    transition: background 0.2s, transform 0.2s;
    white-space: nowrap;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .panel-item:hover {
    background: rgba(255, 255, 255, 0.75);
    transform: translateX(-4px);
  }

  .panel-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent-blue);
    flex-shrink: 0;
  }

  .panel-dot.green { background: #00C853; }
  .panel-dot.orange { background: #FF6D00; }
  .panel-dot.purple { background: #AA00FF; }

  /* ========== NAVBAR ========== */
  #navbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 1.5rem 4rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 100;
    mix-blend-mode: normal;
  }

  .nav-logo {
    font-family: var(--font-heading);
    font-weight: 900;
    font-size: 1.3rem;
    color: var(--text-primary);
    text-decoration: none;
    letter-spacing: -0.02em;
    cursor: none;
  }

  .nav-links {
    display: flex;
    gap: 2.5rem;
    list-style: none;
  }

  .nav-links a {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 0.85rem;
    color: var(--text-primary);
    text-decoration: none;
    letter-spacing: 0.05em;
    cursor: none;
    position: relative;
    transition: color 0.2s;
  }

  .nav-links a::after {
    content: '';
    position: absolute;
    bottom: -3px;
    left: 0;
    width: 0;
    height: 2px;
    background: var(--accent-blue);
    transition: width 0.3s;
  }

  .nav-links a:hover::after { width: 100%; }
  .nav-links a:hover { color: var(--accent-blue); }

  /* ========== ABOUT SECTION (within portfolio page) ========== */
  .about-section {
    margin-top: 6rem;
    position: relative;
    z-index: 5;
  }

  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3rem;
    align-items: center;
  }

  .about-text-block {
    background: var(--card-bg-glass);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.6);
    border-radius: var(--border-radius-lg);
    padding: 3rem;
  }

  .about-label {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 1rem;
  }

  .about-heading {
    font-family: var(--font-heading);
    font-weight: 900;
    font-size: clamp(2rem, 4vw, 3.5rem);
    color: var(--text-primary);
    line-height: 1;
    margin-bottom: 1.5rem;
    letter-spacing: -0.02em;
  }

  .about-body {
    font-size: clamp(1rem, 1.5vw, 1.1rem);
    color: #555;
    line-height: 1.8;
    margin-bottom: 2rem;
  }

  .skills-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }

  .skill-tag {
    background: rgba(255,255,255,0.6);
    border: 1px solid rgba(255,255,255,0.8);
    border-radius: 8px;
    padding: 0.6rem 1rem;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: 0.05em;
    text-align: center;
  }

  .about-visual {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .metric-card {
    background: var(--card-bg-glass);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.6);
    border-radius: var(--border-radius-lg);
    padding: 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .metric-value {
    font-family: var(--font-heading);
    font-weight: 900;
    font-size: clamp(2.5rem, 5vw, 4rem);
    color: var(--text-primary);
    line-height: 1;
  }

  .metric-label {
    font-size: 0.875rem;
    color: #666;
    font-weight: 600;
    max-width: 120px;
    text-align: right;
    line-height: 1.4;
  }

  /* ========== CONTACT STRIP ========== */
  .contact-strip {
    margin-top: 6rem;
    background: var(--text-primary);
    border-radius: var(--border-radius-lg);
    padding: 4rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
    z-index: 5;
    overflow: hidden;
  }

  .contact-strip::before {
    content: 'HELLO';
    position: absolute;
    right: -2rem;
    font-family: var(--font-heading);
    font-weight: 900;
    font-size: 10rem;
    color: rgba(255,255,255,0.04);
    line-height: 1;
    pointer-events: none;
  }

  .contact-heading {
    font-family: var(--font-heading);
    font-weight: 900;
    font-size: clamp(2rem, 4vw, 3.5rem);
    color: #fff;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }

  .contact-sub {
    color: rgba(255,255,255,0.5);
    font-size: 1rem;
    margin-top: 0.5rem;
  }

  .btn-contact {
    font-family: var(--font-heading);
    font-weight: 900;
    font-size: 1rem;
    padding: 1.2rem 3rem;
    background: #fff;
    color: var(--text-primary);
    border: none;
    border-radius: 50px;
    cursor: none;
    letter-spacing: 0.05em;
    transition: transform 0.2s, background 0.2s;
    white-space: nowrap;
  }

  .btn-contact:hover {
    background: var(--accent-blue);
    color: #fff;
    transform: scale(1.05);
  }

  /* ========== FOOTER ========== */
  footer {
    padding: 2rem 6rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
    z-index: 5;
    color: rgba(26,26,26,0.5);
    font-size: 0.8rem;
    font-family: var(--font-body);
  }

  /* ========== SVG Placeholder Styles ========== */
  .card-img-svg {
    width: 100%;
    height: 100%;
  }

  /* ========== Responsive ========== */
  @media (max-width: 900px) {
    #hero {
      grid-template-columns: 1fr;
    }

    .hero-right {
      display: none;
    }

    .hero-left {
      padding: 8rem 2.5rem 4rem;
      min-height: 100vh;
      justify-content: center;
    }

    #portfolio {
      padding: 4rem 2rem;
    }

    .card-featured {
      grid-column: span 1;
    }

    .about-grid {
      grid-template-columns: 1fr;
    }

    .contact-strip {
      flex-direction: column;
      gap: 2rem;
      text-align: center;
      padding: 3rem 2rem;
    }

    footer {
      padding: 1.5rem 2rem;
    }

    #navbar {
      padding: 1.2rem 2rem;
    }

    #floating-panel {
      display: none;
    }
  }

  /* Loading state */
  #loading-screen {
    position: fixed;
    inset: 0;
    background: #fff;
