<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리안 컴퍼니 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ===== 헤더 ===== */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #00ff88, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-info {
            text-align: right;
            font-size: 13px;
            opacity: 0.8;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-left: 8px;
            animation: pulse 2s infinite;
        }

        .status-healthy { background: #00ff88; }
        .status-warning { background: #ffaa00; }
        .status-error { background: #ff4444; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ===== 그리드 레이아웃 ===== */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .grid-2col {
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
        }

        /* ===== 카드 ===== */
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(0, 255, 136, 0.3);
            transform: translateY(-4px);
        }

        .card h3 {
            font-size: 16px;
            margin-bottom: 15px;
            color: #00ff88;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card p {
            font-size: 13px;
            line-height: 1.6;
            opacity: 0.85;
            margin-bottom: 12px;
        }

        .card-stat {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card-stat:last-child {
            border-bottom: none;
        }

        .card-stat-label {
            font-size: 12px;
            opacity: 0.7;
        }

        .card-stat-value {
            font-size: 18px;
            font-weight: 700;
            color: #00ff88;
            font-family: 'Courier New', monospace;
        }

        /* ===== 팀 카드 ===== */
        .team-card {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.05), rgba(0, 204, 255, 0.05));
        }

        .team-card h3 {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .team-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-active {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
        }

        .badge-idle {
            background: rgba(255, 170, 0, 0.2);
            color: #ffaa00;
        }

        .badge-error {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
        }

        /* ===== 차트 섹션 ===== */
        .chart-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 25px;
            backdrop-filter: blur(10px);
            margin-bottom: 40px;
        }

        .chart-container h3 {
            font-size: 16px;
            color: #00ff88;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .chart-wrapper {
            position: relative;
            height: 300px;
            margin-bottom: 20px;
        }

        /* ===== 리포트 섹션 ===== */
        .report-item {
            background: rgba(0, 255, 136, 0.05);
            border-left: 3px solid #00ff88;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .report-item:hover {
            background: rgba(0, 255, 136, 0.1);
            padding-left: 18px;
        }

        .report-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .report-team {
            font-weight: 600;
            color: #00ff88;
        }

        .report-date {
            opacity: 0.6;
            font-size: 12px;
        }

        .report-summary {
            font-size: 12px;
            opacity: 0.85;
            line-height: 1.5;
        }

        /* ===== 로딩/에러 상태 ===== */
        .loading {
            text-align: center;
            padding: 40px;
            opacity: 0.7;
        }

        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(0, 255, 136, 0.2);
            border-top-color: #00ff88;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            opacity: 0.6;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.4;
        }

        /* ===== 모바일 반응형 ===== */
        @media (max-width: 768px) {
            .grid, .grid-2col {
                grid-template-columns: 1fr;
            }

            header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            h1 {
                font-size: 22px;
            }

            .chart-wrapper {
                height: 250px;
            }
        }

        /* ===== 스크롤 스타일 ===== */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 136, 0.3);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 255, 136, 0.5);
        }

        /* ===== 애니메이션 ===== */
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .number-ticker {
            font-family: 'Courier New', monospace;
            font-weight: 700;
            display: inline-block;
        }

        /* ===== 섹션 제목 ===== */
        .section-title {
            font-size: 20px;
            font-weight: 700;
            color: #00ff88;
            margin: 40px 0 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(0, 255, 136, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 헤더 -->
        <header>
            <h1>리안 컴퍼니 대시보드</h1>
            <div class="header-info">
                <div>
                    <span id="current-time">00:00:00</span>
                    <span class="status-indicator status-healthy"></span>
                </div>
                <div style="font-size: 11px; margin-top: 5px; opacity: 0.6;">
                    마지막 업데이트: <span id="last-update">로딩중...</span>
                </div>
            </div>
        </header>

        <!-- 팀 현황 (그리드) -->
        <div class="section-title">팀 현황</div>
        <div id="teams-container" class="grid">
            <div class="loading">
                <div class="spinner"></div>
                <p style="margin-top: 12px;">데이터 로딩중...</p>
            </div>
        </div>

        <!-- 실행 통계 -->
        <div class="section-title">시스템 통계</div>
        <div id="stats-container" class="grid">
            <div class="loading">
                <div class="spinner"></div>
            </div>
        </div>

        <!-- 콘텐츠 생산 차트 -->
        <div class="section-title">콘텐츠 생산</div>
        <div class="chart-container">
            <h3>최근 7일 일별 실행 횟수</h3>
            <div class="chart-wrapper">
                <canvas id="daily-runs-chart"></canvas>
            </div>
        </div>

        <!-- 발행 큐 -->
        <div class="section-title">발행 대기열</div>
        <div id="publish-queue-container" class="card">
            <h3>대기중인 콘텐츠</h3>
            <div id="queue-list">
                <div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <p>데이터 로딩중...</p>
                </div>
            </div>
        </div>

        <!-- API 비용 -->
        <div class="section-title">API 비용 추적</div>
        <div id="api-costs-container" class="grid">
            <div class="loading">
                <div class="spinner"></div>
            </div>
        </div>

        <!-- 최근 보고서 -->
        <div class="section-title">최근 보고서</div>
        <div id="reports-container">
            <div class="loading">
                <div class="spinner"></div>
            </div>
        </div>
    </div>

    <script>
        // ===== 데이터 로딩 및 렌더링 =====
        const API_URL = 'dashboard_data.json';
        const REFRESH_INTERVAL = 5000; // 5초

        let dashboardData = null;
        let dailyRunsChart = null;

        async function loadData() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                dashboardData = await response.json();
                renderDashboard();
                updateTime();
            } catch (error) {
                console.error('데이터 로드 실패:', error);
                showError('데이터를 불러올 수 없습니다. 잠시 후 다시 시도하세요.');
            }
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('current-time').textContent = now.toLocaleTimeString('ko-KR');

            if (dashboardData) {
                const lastUpdate = new Date(dashboardData.timestamp);
                document.getElementById('last-update').textContent = lastUpdate.toLocaleTimeString('ko-KR');
            }
        }

        function renderDashboard() {
            renderTeams();
            renderStats();
            renderCharts();
            renderPublishQueue();
            renderAPICosts();
            renderReports();
        }

        // ===== 팀 렌더링 =====
        function renderTeams() {
            const container = document.getElementById('teams-container');
            const teams = dashboardData.team_stats;

            if (Object.keys(teams).length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🤖</div><p>팀 데이터가 없습니다</p></div>';
                return;
            }

            const html = Object.entries(teams).map(([teamName, stats]) => `
                <div class="card team-card fade-in">
                    <h3>
                        ${teamName}
                        <span class="team-badge badge-${stats.status}">
                            ${stats.status === 'active' ? '활동' : '대기'}
                        </span>
                    </h3>
                    <div class="card-stat">
                        <span class="card-stat-label">생성 콘텐츠</span>
                        <span class="card-stat-value">${stats.content_count}</span>
                    </div>
                    <div class="card-stat">
                        <span class="card-stat-label">마지막 업데이트</span>
                        <span class="card-stat-value" style="font-size: 12px;">
                            ${stats.last_update ? formatDate(stats.last_update) : '업데이트 없음'}
                        </span>
                    </div>
                </div>
            `).join('');

            container.innerHTML = html;
        }

        // ===== 통계 렌더링 =====
        function renderStats() {
            const container = document.getElementById('stats-container');
            const summary = dashboardData.daily_runs.summary;

            const html = `
                <div class="card fade-in">
                    <h3>총 실행 횟수</h3>
                    <div class="card-stat" style="border: none; padding: 0;">
                        <span class="card-stat-value" style="font-size: 36px;">
                            <span class="number-ticker">${summary.total_runs || 0}</span>
                        </span>
                    </div>
                </div>
                <div class="card fade-in">
                    <h3>이번주 실행</h3>
                    <div class="card-stat" style="border: none; padding: 0;">
                        <span class="card-stat-value" style="font-size: 36px;">
                            <span class="number-ticker">${summary.runs_this_week || 0}</span>회
                        </span>
                    </div>
                </div>
                <div class="card fade-in">
                    <h3>오늘 실행</h3>
                    <div class="card-stat" style="border: none; padding: 0;">
                        <span class="card-stat-value" style="font-size: 36px;">
                            <span class="number-ticker">${summary.runs_today || 0}</span>회
                        </span>
                    </div>
                </div>
            `;

            container.innerHTML = html;
        }

        // ===== 차트 렌더링 =====
        function renderCharts() {
            const runs = dashboardData.daily_runs.runs;
            const dates = {};

            // 최근 7일 데이터 구성
            const today = new Date();
            for (let i = 6; i >= 0; i--) {
                const date = new Date(today);
                date.setDate(date.getDate() - i);
                const dateStr = date.toISOString().split('T')[0];
                dates[dateStr] = 0;
            }

            // 실행 데이터 집계
            runs.forEach(run => {
                if (run.status === 'completed' && dates.hasOwnProperty(run.date)) {
                    dates[run.date]++;
                }
            });

            const ctx = document.getElementById('daily-runs-chart').getContext('2d');

            if (dailyRunsChart) {
                dailyRunsChart.destroy();
            }

            dailyRunsChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Object.keys(dates).map(d => new Date(d).toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' })),
                    datasets: [{
                        label: '일일 실행 횟수',
                        data: Object.values(dates),
                        borderColor: '#00ff88',
                        backgroundColor: 'rgba(0, 255, 136, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4,
                        pointBackgroundColor: '#00ff88',
                        pointBorderColor: '#0a0a0a',
                        pointBorderWidth: 2,
                        pointRadius: 5,
                        pointHoverRadius: 7
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: {
                                color: '#e0e0e0',
                                font: { size: 12 }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { color: '#888', stepSize: 1 },
                            grid: { color: 'rgba(255, 255, 255, 0.05)' }
                        },
                        x: {
                            ticks: { color: '#888' },
                            grid: { color: 'rgba(255, 255, 255, 0.05)' }
                        }
                    }
                }
            });
        }

        // ===== 발행 큐 렌더링 =====
        function renderPublishQueue() {
            const queue = dashboardData.publish_queue;
            const container = document.getElementById('queue-list');

            if (!queue.items || queue.items.length === 0) {
                container.innerHTML = '<div class="empty-state" style="padding: 30px;"><div class="empty-state-icon">✅</div><p>대기열이 비어있습니다</p></div>';
                return;
            }

            const html = queue.items.map((item, idx) => `
                <div class="report-item fade-in" style="animation-delay: ${idx * 0.1}s;">
                    <div class="report-header">
                        <span style="color: #00ff88; font-weight: 600;">${item.title || '제목 없음'}</span>
                        <span class="badge-${item.status === 'completed' ? 'active' : 'idle'}" style="padding: 2px 6px; font-size: 10px;">
                            ${item.status === 'completed' ? '발행됨' : '대기중'}
                        </span>
                    </div>
                    <div style="font-size: 12px; opacity: 0.7;">
                        채널: ${item.channel || '미지정'} • ${formatDate(item.created_at || new Date().toISOString())}
                    </div>
                </div>
            `).join('');

            container.innerHTML = html;
        }

        // ===== API 비용 렌더링 =====
        function renderAPICosts() {
            const container = document.getElementById('api-costs-container');
            const costs = dashboardData.api_costs;

            const html = Object.entries(costs.models).map(([model, data]) => `
                <div class="card fade-in">
                    <h3>${formatModelName(model)}</h3>
                    <div class="card-stat">
                        <span class="card-stat-label">호출 횟수</span>
                        <span class="card-stat-value">${data.calls}</span>
                    </div>
                    <div class="card-stat">
                        <span class="card-stat-label">예상 비용</span>
                        <span class="card-stat-value">$${data.estimate_usd.toFixed(2)}</span>
                    </div>
                </div>
            `).join('');

            container.innerHTML = html;
        }

        // ===== 보고서 렌더링 =====
        function renderReports() {
            const container = document.getElementById('reports-container');
            const reports = dashboardData.recent_reports;

            if (!reports || reports.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📋</div><p>최근 보고서가 없습니다</p></div>';
                return;
            }

            const html = reports.map((report, idx) => `
                <div class="report-item fade-in" style="animation-delay: ${idx * 0.1}s;">
                    <div class="report-header">
                        <span class="report-team">${report.team}</span>
                        <span class="report-date">${report.date}</span>
                    </div>
                    <p class="report-summary">${report.summary}</p>
                </div>
            `).join('');

            container.innerHTML = html;
        }

        // ===== 유틸리티 =====
        function formatDate(isoString) {
            const date = new Date(isoString);
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);

            if (date.toDateString() === today.toDateString()) {
                return `오늘 ${date.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })}`;
            } else if (date.toDateString() === yesterday.toDateString()) {
                return '어제';
            } else {
                return date.toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' });
            }
        }

        function formatModelName(model) {
            const names = {
                'claude_opus': 'Claude Opus',
                'claude_sonnet': 'Claude Sonnet',
                'claude_haiku': 'Claude Haiku',
                'gpt_4o': 'GPT-4o',
                'gemini': 'Gemini',
                'perplexity': 'Perplexity'
            };
            return names[model] || model;
        }

        function showError(message) {
            document.body.innerHTML += `
                <div style="position: fixed; top: 20px; right: 20px; background: rgba(255, 68, 68, 0.2); border: 1px solid #ff4444; color: #ff4444; padding: 15px 20px; border-radius: 8px; font-size: 13px;">
                    ${message}
                </div>
            `;
        }

        // ===== 초기화 =====
        setInterval(updateTime, 1000);
        setInterval(loadData, REFRESH_INTERVAL);
        loadData();
    </script>
</body>
</html>
