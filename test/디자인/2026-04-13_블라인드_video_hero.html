<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BLIND — 아무도 모르게, 모든 걸 안다</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --dark: #0a0a0a;
    --text: #f0ece4;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--dark);
    color: var(--text);
    font-family: 'Georgia', 'Times New Roman', serif;
    overflow-x: hidden;
  }

  /* ── 히어로 ── */
  .hero {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .hero video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: saturate(0.7) contrast(1.1);
  }

  /* 그라디언트 오버레이 */
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to bottom,
        rgba(10,10,10,0.2) 0%,
        rgba(10,10,10,0.1) 40%,
        rgba(10,10,10,0.55) 75%,
        rgba(10,10,10,0.95) 100%
      );
    z-index: 1;
  }

  /* 수평 빛줄기 강조 오버레이 */
  .hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 22px,
      rgba(0,0,0,0.18) 22px,
      rgba(0,0,0,0.18) 24px
    );
    z-index: 2;
    pointer-events: none;
  }

  .hero-content {
    position: relative;
    z-index: 10;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    padding: 0 24px;
    transform: translateY(-32px);
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--gold);
    font-family: 'Arial', sans-serif;
    font-weight: 400;
    opacity: 0;
    animation: fadeUp 1s ease 0.4s forwards;
  }

  .logo {
    font-size: clamp(72px, 14vw, 140px);
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text);
    line-height: 1;
    opacity: 0;
    animation: fadeUp 1.1s ease 0.7s forwards;
    text-shadow:
      0 0 80px rgba(201,168,76,0.25),
      0 2px 40px rgba(0,0,0,0.8);
  }

  .logo span {
    color: var(--gold);
  }

  .tagline {
    font-size: clamp(14px, 1.8vw, 18px);
    color: rgba(240,236,228,0.65);
    letter-spacing: 0.06em;
    font-style: italic;
    opacity: 0;
    animation: fadeUp 1s ease 1.0s forwards;
    max-width: 420px;
    line-height: 1.7;
  }

  .divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    opacity: 0;
    animation: fadeIn 1s ease 1.2s forwards;
  }

  .cta-group {
    display: flex;
    gap: 16px;
    align-items: center;
    opacity: 0;
    animation: fadeUp 1s ease 1.3s forwards;
  }

  .btn-primary {
    padding: 14px 36px;
    background: var(--gold);
    color: var(--dark);
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-family: 'Arial', sans-serif;
    font-weight: 700;
    border: none;
    cursor: pointer;
    transition: background 0.25s, transform 0.2s;
  }
  .btn-primary:hover {
    background: var(--gold-light);
    transform: translateY(-1px);
  }

  .btn-ghost {
    padding: 14px 36px;
    background: transparent;
    color: rgba(240,236,228,0.7);
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-family: 'Arial', sans-serif;
    font-weight: 400;
    border: 1px solid rgba(240,236,228,0.25);
    cursor: pointer;
    transition: border-color 0.25s, color 0.25s;
  }
  .btn-ghost:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

  /* 스크롤 인디케이터 */
  .scroll-hint {
    position: absolute;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    opacity: 0;
    animation: fadeIn 1s ease 2s forwards;
  }
  .scroll-hint span {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(240,236,228,0.35);
    font-family: 'Arial', sans-serif;
  }
  .scroll-line {
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, rgba(201,168,76,0.6), transparent);
    animation: scrollPulse 2s ease infinite;
  }

  /* ── 다음 섹션 티저 ── */
  .below {
    background: var(--dark);
    padding: 120px 24px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 48px;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    font-family: 'Arial', sans-serif;
  }

  .section-headline {
    font-size: clamp(28px, 4vw, 48px);
    font-weight: 400;
    line-height: 1.4;
    color: var(--text);
    max-width: 640px;
  }

  .section-headline em {
    font-style: italic;
    color: var(--gold-light);
  }

  .features {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 40px;
    max-width: 900px;
    width: 100%;
    margin-top: 24px;
  }
  @media (max-width: 640px) { .features { grid-template-columns: 1fr; } }

  .feature {
    display: flex;
    flex-direction: column;
    gap: 12px;
    text-align: left;
  }
  .feature-num {
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 0.2em;
    font-family: 'Arial', sans-serif;
  }
  .feature-title {
    font-size: 18px;
    font-weight: 400;
    color: var(--text);
  }
  .feature-desc {
    font-size: 14px;
    color: rgba(240,236,228,0.5);
    line-height: 1.7;
    font-family: 'Arial', sans-serif;
    font-weight: 300;
  }
  .feature-line {
    width: 32px;
    height: 1px;
    background: var(--gold);
    opacity: 0.5;
  }

  /* ── 애니메이션 ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes scrollPulse {
    0%, 100% { opacity: 0.6; transform: scaleY(1); }
    50%       { opacity: 1;   transform: scaleY(1.1); }
  }
</style>
</head>
<body>

<section class="hero">
  <video autoplay muted loop playsinline>
    <source src="https://v3b.fal.media/files/b/0a960d8d/ppZmBxlbttoPUHaLexTeM_output.mp4" type="video/mp4">
  </video>

  <div class="hero-content">
    <p class="eyebrow">익명의 공간 · 진실의 목소리</p>
    <h1 class="logo">BL<span>I</span>ND</h1>
    <div class="divider"></div>
    <p class="tagline">아무도 모르게, 모든 걸 안다</p>
    <div class="cta-group">
      <button class="btn-primary">지금 시작하기</button>
      <button class="btn-ghost">더 알아보기</button>
    </div>
  </div>

  <div class="scroll-hint">
    <div class="scroll-line"></div>
    <span>Scroll</span>
  </div>
</section>

<section class="below">
  <p class="section-label">Why Blind</p>
  <h2 class="section-headline">
    진짜 이야기는<br>
    <em>가려진 곳에서 시작된다</em>
  </h2>
  <div class="features">
    <div class="feature">
      <p class="feature-num">01</p>
      <div class="feature-line"></div>
      <h3 class="feature-title">완전한 익명</h3>
      <p class="feature-desc">누구도 당신이 누구인지 알 수 없습니다. 직함도, 이름도, 흔적도 없이.</p>
    </div>
    <div class="feature">
      <p class="feature-num">02</p>
      <div class="feature-line"></div>
      <h3 class="feature-title">검증된 목소리</h3>
      <p class="feature-desc">익명이지만 검증된 사람들의 이야기. 가짜 없는 진짜 인사이트.</p>
    </div>
    <div class="feature">
      <p class="feature-num">03</p>
      <div class="feature-line"></div>
      <h3 class="feature-title">숨겨진 정보</h3>
      <p class="feature-desc">어디서도 공개되지 않는 정보들이 이곳에서 흐릅니다.</p>
    </div>
  </div>
</section>

</body>
</html>
