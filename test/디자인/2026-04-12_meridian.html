<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MERIDIAN</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; cursor:none; }
    html, body { background:#000; overflow:hidden; height:100%; }

    #canvas { position:fixed; inset:0; width:100%; height:100%; display:block; }

    /* 화이트 플래시 */
    #flash { position:fixed; inset:0; background:#fff8f0; opacity:0; pointer-events:none; z-index:20; }

    /* ── 씬별 내러티브 텍스트 (왼쪽 배치 — 기둥에서 멀리) ── */
    .narr {
      position: fixed;
      left: 7%;
      bottom: 22%;
      z-index: 10;
      pointer-events: none;
      opacity: 0;
      transform: translateY(18px);
      max-width: 340px;
    }
    .narr-label {
      font-family: 'Inter', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.45em;
      color: rgba(200,169,110,0.65);
      text-transform: uppercase;
      margin-bottom: 0.7rem;
    }
    .narr-body {
      font-family: 'Inter', sans-serif;
      font-size: clamp(1rem, 2.2vw, 1.25rem);
      font-weight: 300;
      color: rgba(255,255,255,0.88);
      line-height: 1.55;
      text-shadow:
        0 0 40px rgba(0,0,0,1),
        0 0 20px rgba(0,0,0,0.95),
        0 2px 6px rgba(0,0,0,0.9);
    }
    .narr-body em {
      font-style: normal;
      color: rgba(200,169,110,0.9);
    }

    /* 씬 4: 돌진 전 중앙 문구 (기둥 넓어지기 전) */
    #s4text {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      pointer-events: none;
      opacity: 0;
    }
    #s4text p {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(1.1rem, 2.8vw, 1.6rem);
      font-weight: 400;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.12em;
      text-align: center;
      text-shadow: 0 0 40px rgba(0,0,0,0.95), 0 2px 8px rgba(0,0,0,0.9);
    }

    /* 씬 5: 브랜드 (기둥이 뒤로 물러난 뒤 중앙 — 배경 어두움) */
    #brand {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      pointer-events: none;
    }
    #tagline {
      font-family: 'Inter', sans-serif;
      font-size: clamp(0.55rem, 1.1vw, 0.72rem);
      letter-spacing: 0.5em;
      color: rgba(200,169,110,0.9);
      text-transform: uppercase;
      clip-path: inset(0 100% 0 0);
      margin-bottom: 1.6rem;
    }
    #headline {
      font-size: clamp(4rem, 15vw, 11rem);
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.03em;
      line-height: 1;
      opacity: 0;
      transform: translateY(60px) scale(0.78);
      will-change: transform, opacity;
      text-shadow: 0 0 80px rgba(200,169,110,0.15);
    }
    #sub {
      margin-top: 1.6rem;
      font-family: 'Inter', sans-serif;
      font-size: clamp(0.85rem, 1.8vw, 1.0rem);
      font-weight: 300;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.08em;
      opacity: 0;
      transform: translateY(16px);
      max-width: 400px;
      text-align: center;
    }
    #cta {
      margin-top: 2.6rem;
      padding: 0.85rem 2.6rem;
      background: transparent;
      border: 1px solid rgba(200,169,110,0.45);
      color: #c8a96e;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      pointer-events: all;
      opacity: 0;
      transform: translateY(16px);
      transition: background 0.3s, border-color 0.3s;
    }
    #cta:hover { background: rgba(200,169,110,0.08); border-color: rgba(200,169,110,0.75); }

    /* 커서 */
    #cursor      { position:fixed; width:5px; height:5px; background:#c8a96e; border-radius:50%; pointer-events:none; z-index:9999; transform:translate(-50%,-50%); }
    #cursor-ring { position:fixed; width:28px; height:28px; border:1px solid rgba(200,169,110,0.28); border-radius:50%; pointer-events:none; z-index:9998; transform:translate(-50%,-50%); }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="flash"></div>

<!-- 씬 2: 선이 나타남 -->
<div class="narr" id="s2text">
  <div class="narr-label">— Scene I</div>
  <div class="narr-body">In the dark,<br>a line appeared.</div>
</div>

<!-- 씬 3: 좌표 / 방향 -->
<div class="narr" id="s3text">
  <div class="narr-label">— Scene II</div>
  <div class="narr-body">East from West.<br>Known from Unknown.<br><em>Everything measured from here.</em></div>
</div>

<!-- 씬 4: 돌진 직전 -->
<div id="s4text">
  <p>You have stood at this line<br>your entire life.</p>
</div>

<!-- 씬 5: 브랜드 -->
<div id="brand">
  <div id="tagline">The line from which all journeys begin</div>
  <div id="headline">MERIDIAN</div>
  <div id="sub">Find your bearing. Move with intention.</div>
  <button id="cta">Find Your Line</button>
</div>

<div id="cursor"></div>
<div id="cursor-ring"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
// ──────────────────────────────────────────────
// Renderer
// ──────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const W = () => window.innerWidth;
const H = () => window.innerHeight;

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(W(), H());
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.autoClear = false;

// ──────────────────────────────────────────────
// BG Scene — 풀스크린 GLSL (항상 확실하게 보임)
// ──────────────────────────────────────────────
const bgCam   = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
const bgScene = new THREE.Scene();

const bgMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime:     { value: 0.0 },
    uProgress: { value: 0.0 },
  },
  vertexShader: `
    varying vec2 vUv;
    void main(){ vUv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }
  `,
  fragmentShader: `
    precision highp float;
    uniform float uTime;
    uniform float uProgress;
    varying vec2 vUv;

    float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
    float noise(vec2 p){
      vec2 i=floor(p), f=fract(p); f=f*f*(3.-2.*f);
      return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),
                 mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);
    }

    // 별 하나
    float star(vec2 uv, float seed){
      vec2 g = floor(uv * 90.0);
      float s = hash(g + seed);
      if(s < 0.976) return 0.0;
      vec2 local = fract(uv * 90.0) - 0.5;
      float twink = 0.6 + 0.4 * sin(uTime*(1.5+s*3.0) + s*6.28);
      return exp(-dot(local,local)*55.0) * twink * ((s-0.976)/0.024);
    }

    void main(){
      float cx   = vUv.x - 0.5;   // [-0.5, 0.5]
      float p    = clamp(uProgress, 0.0, 1.0);

      // ── 씬별 진행도 ──
      float s1p = clamp(p / 0.14,          0.,1.); // void          0→0.14
      float s2p = clamp((p-0.14)/0.16,     0.,1.); // 선 등장        0.14→0.30
      float s3p = clamp((p-0.30)/0.24,     0.,1.); // 좌표 격자      0.30→0.54
      float s4p = clamp((p-0.54)/0.13,     0.,1.); // 돌진           0.54→0.67
      float flashP = clamp((p-0.67)/0.06,  0.,1.); // 플래시         0.67→0.73
      float s5p = clamp((p-0.73)/0.27,     0.,1.); // 등장 이후      0.73→1.0

      // 기둥 폭 —
      // S1: 없음
      // S2: 매우 얇게 등장 (새벽 빛처럼)
      // S3: 안정적으로 밝음
      // S4: 급격히 커짐 (돌진)
      // S5: 뒤로 물러나며 얇아짐
      float wf;
      if(p < 0.14){
        wf = 0.0;
      } else if(p < 0.30){
        wf = mix(0.0008, 0.003, s2p);
      } else if(p < 0.54){
        wf = mix(0.003, 0.012, s3p);
      } else if(p < 0.67){
        wf = mix(0.012, 0.12, s4p * s4p);
      } else {
        wf = mix(0.001, 0.001, s5p);
      }

      float d = abs(cx);

      // ── 기둥 레이어 ──
      float aura = 0.0, mid = 0.0, beam = 0.0, core = 0.0;
      if(wf > 0.0){
        aura = exp(-d*d / max(1e-8, wf*55.0));
        mid  = exp(-d*d / max(1e-8, wf*7.5));
        beam = exp(-d*d / max(1e-8, wf*1.2));
        core = exp(-d*d / max(1e-8, wf*0.06));

        float brightnessScale = 1.0;
        if(p < 0.30) brightnessScale = mix(0.3, 0.7, s2p);
        else if(p < 0.54) brightnessScale = mix(0.7, 1.1, s3p);
        else if(p < 0.67) brightnessScale = mix(1.1, 5.0, s4p);
        else brightnessScale = mix(0.4, 0.15, s5p);

        float flicker = 0.93 + 0.07 * sin(uTime*14.0 + vUv.y*7.0);
        float f2 = (p < 0.30) ? (0.75 + 0.25*sin(uTime*22.0 + vUv.y*15.0)) : 1.0; // S2 fragile flicker
        aura *= brightnessScale * flicker * f2;
        mid  *= brightnessScale * flicker * f2;
        beam *= brightnessScale * flicker * f2;
        core *= brightnessScale * flicker * f2;
      }

      // ── 좌표 격자 (씬 3) ──
      float gridAlpha = s3p * (1.0 - s4p);
      vec3 gridGlow = vec3(0.0);
      if(gridAlpha > 0.001){
        // 수평선 5개 (y=0.2, 0.4, 0.6, 0.8, ... 균등하게)
        float gv = mod(vUv.y * 4.0, 1.0);
        float hSoft = exp(-pow(gv-0.5,2.0)*35.0) * 0.18;
        float hSharp = exp(-pow(gv-0.5,2.0)*400.0) * 0.5;

        // 중앙에서 바깥으로 스윕 (격자가 퍼져나감)
        float sweep = clamp(s3p*2.2 - abs(cx)*2.5, 0.0, 1.0);

        gridGlow = vec3(0.12, 0.10, 0.35) * (hSoft + hSharp) * sweep * gridAlpha;

        // 세로선들 (기둥 좌우로)
        float vLine = 0.0;
        float vPositions[4]; vPositions[0]=-0.35; vPositions[1]=-0.20; vPositions[2]=0.20; vPositions[3]=0.35;
        for(int i=0;i<4;i++){
          float vd = abs(cx - vPositions[i]);
          vLine += exp(-vd*vd*2000.0) * 0.25;
        }
        float vSweep = clamp(s3p*1.8 - 0.3, 0.0, 1.0);
        gridGlow += vec3(0.10, 0.08, 0.32) * vLine * vSweep * gridAlpha;
      }

      // ── 별 (씬 1, 씬 2 초반) ──
      float starFade = clamp(1.0 - (p-0.05)/0.25, 0.0, 1.0);
      float stars = (star(vUv, 0.0) + star(vUv, 1.7) + star(vUv, 3.3)) * starFade * 0.55;

      // ── 배경 성운 ──
      float n = noise(vUv*2.2 + uTime*0.015)*0.5 + noise(vUv*5.0)*0.25;
      float radial = exp(-length(vUv-vec2(0.5))*2.5);
      vec3 bg = vec3(0.02, 0.007, 0.055) + vec3(0.055, 0.022, 0.008)*radial*n;
      // S5: 더 차갑게
      bg = mix(bg, vec3(0.005, 0.012, 0.040), s5p*0.7);

      // 측면 인디고 기둥 (씬 3까지)
      float flanks = (exp(-abs(cx+0.40)*abs(cx+0.40)*700.0)
                    + exp(-abs(cx-0.40)*abs(cx-0.40)*700.0))
                   * 0.22 * (1.0 - s4p);

      // ── 컬러 합성 ──
      vec3 col = bg
               + vec3(stars)
               + gridGlow
               + vec3(0.22,0.12,0.01)*aura
               + vec3(0.80,0.58,0.18)*mid
               + vec3(1.00,0.84,0.42)*beam
               + vec3(1.00,0.97,0.88)*core
               + vec3(0.22,0.18,0.70)*flanks;

      gl_FragColor = vec4(col, 1.0);
    }
  `,
  depthTest: false,
  depthWrite: false,
});
bgScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), bgMat));

// ──────────────────────────────────────────────
// 파티클 씬 (3D perspective)
// ──────────────────────────────────────────────
const partCam   = new THREE.PerspectiveCamera(60, W()/H(), 0.01, 500);
const partScene = new THREE.Scene();

const PC = 280;
const pP = new Float32Array(PC * 3);
const pD = [];
for(let i=0; i<PC; i++){
  const ang = Math.random()*Math.PI*2;
  const r   = 0.15 + Math.random()*4.0;
  const y   = (Math.random()-0.5)*40;
  pD.push({ ang, r, spd:0.015+Math.random()*0.09, phase:Math.random()*Math.PI*2, y });
  pP[i*3] = Math.cos(ang)*r*0.1; pP[i*3+1]=y; pP[i*3+2]=Math.sin(ang)*r*0.04;
}
const pGeo = new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(pP, 3));
const pMat = new THREE.PointsMaterial({
  color:0xd4a050, size:0.04, transparent:true, opacity:0.5,
  blending:THREE.AdditiveBlending, depthWrite:false, sizeAttenuation:true,
});
partScene.add(new THREE.Points(pGeo, pMat));

function tickParticles(t){
  const a = pGeo.attributes.position.array;
  const p = bgMat.uniforms.uProgress.value;
  // S4 돌진 때 파티클 rush (z로 빠르게 날아오는 효과)
  const rushScale = 1.0 + Math.max(0, (p-0.54)/0.13) * 3.5;
  for(let i=0; i<PC; i++){
    const d = pD[i];
    d.ang += d.spd * 0.004;
    const pulse = d.r*(0.04+0.08*Math.abs(Math.sin(d.phase+t*0.055)));
    a[i*3]   = Math.cos(d.ang)*pulse;
    a[i*3+1] = d.y + Math.sin(t*0.17+d.phase)*0.45;
    a[i*3+2] = Math.sin(d.ang)*pulse*0.1 * rushScale;
  }
  pGeo.attributes.position.needsUpdate = true;
}

function syncPartCam(){
  const p = bgMat.uniforms.uProgress.value;

  // 기본 z 접근
  let cz = 8;
  if(p > 0.14) cz = 8 - Math.pow(Math.min((p-0.14)/0.53,1),1.3)*19;

  // 씬 3: 오른쪽으로 살짝 팬 (좌표 격자 느낌)
  const s3p = Math.max(0, Math.min((p-0.30)/0.24, 1.0));
  const s4p = Math.max(0, Math.min((p-0.54)/0.13, 1.0));
  const panX = Math.sin(s3p*Math.PI)*1.8*(1.0-s4p);

  // 씬 5: 위로 상승
  const s5p = Math.max(0, (p-0.73)/0.27);
  const riseY = s5p * 2.0;

  partCam.position.set(panX, riseY, cz);
  partCam.lookAt(0, 0, 0);
}
syncPartCam();

// ──────────────────────────────────────────────
// GSAP Timeline — 16초 자동 재생
// ──────────────────────────────────────────────
const prog = bgMat.uniforms.uProgress;
const tl   = gsap.timeline({ delay: 0.5 });

// 씬 1: VOID (0→2.5s) — 별만 보임
tl.to(prog, { value: 0.14, duration: 2.5, ease: 'none' }, 0);

// 씬 2: LINE APPEARS (2.5→6s) — 선 떨림
tl.to(prog, { value: 0.30, duration: 3.5, ease: 'power1.inOut' }, 2.5);
tl.to('#s2text', { opacity:1, y:0, duration:1.4, ease:'power3.out' }, 3.2);
tl.to('#s2text', { opacity:0, duration:1.0 }, 5.5);

// 씬 3: ORIENTATION — 격자 + 카메라 팬 (6→10.5s)
tl.to(prog, { value: 0.54, duration: 4.5, ease: 'power1.inOut' }, 6.0);
tl.to('#s3text', { opacity:1, y:0, duration:1.4, ease:'power3.out' }, 6.8);
tl.to('#s3text', { opacity:0, duration:1.0 }, 9.5);

// 씬 4: THE RUSH (10.5→12.5s) — 돌진
tl.to('#s4text', { opacity:1, duration:1.0, ease:'power2.out' }, 10.5);
tl.to('#s4text', { opacity:0, duration:0.5 }, 11.8);
tl.to(prog, { value: 0.70, duration: 2.0, ease: 'power4.in' }, 10.5);

// Flash (12.4s)
tl.to('#flash', { opacity:1, duration:0.08 }, 12.3)
  .to('#flash', { opacity:0, duration:1.1, ease:'power2.out' }, 12.38);

// 씬 5: EMERGENCE (12.4→16s)
tl.to(prog, { value:1.0, duration:3.6, ease:'power2.out' }, 12.4);

// 브랜드 reveal
tl.to('#tagline', { clipPath:'inset(0 0% 0 0)', duration:1.8, ease:'power3.out' }, 13.2);
tl.to('#headline', { opacity:1, y:0, scale:1, duration:1.8, ease:'power4.out' }, 13.9);
tl.to('#sub',      { opacity:1, y:0, duration:1.3, ease:'power3.out' }, 14.9);
tl.to('#cta',      { opacity:1, y:0, duration:1.0, ease:'power2.out',
  onComplete: () => {
    document.documentElement.style.overflow = '';
    document.body.style.overflow = '';
  }
}, 15.8);

// ──────────────────────────────────────────────
// RAF
// ──────────────────────────────────────────────
const clock = new THREE.Clock();
(function animate(){
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  bgMat.uniforms.uTime.value = t;
  tickParticles(t);
  syncPartCam();
  renderer.clear();
  renderer.clearDepth();
  renderer.render(bgScene, bgCam);
  renderer.clearDepth();
  renderer.render(partScene, partCam);
})();

window.addEventListener('resize', () => {
  renderer.setSize(W(), H());
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  partCam.aspect = W() / H();
  partCam.updateProjectionMatrix();
});

// ──────────────────────────────────────────────
// Cursor
// ──────────────────────────────────────────────
const cur  = document.getElementById('cursor');
const ring = document.getElementById('cursor-ring');
let mx=0, my=0, rx=0, ry=0;
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  gsap.to(cur, { x:mx, y:my, duration:0.05, overwrite:true });
});
setInterval(() => {
  rx += (mx-rx)*0.1; ry += (my-ry)*0.1;
  gsap.set(ring, { x:rx, y:ry });
}, 16);
</script>
</body>
</html>
