<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scene 1 — THE FISSURE (Test)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; }
</style>
</head>
<body>

<!-- ===== HERO SECTION START ===== -->
<section class="hero" id="scene-1">
  <canvas id="hero-canvas"></canvas>
  <div class="hero-text-layer" id="hero-text">
    <div class="discovery-wrap" id="discovery-wrap">
      <span class="d-char" data-i="0">D</span>
      <span class="d-char" data-i="1">I</span>
      <span class="d-char" data-i="2">S</span>
      <span class="d-char" data-i="3">C</span>
      <span class="d-char" data-i="4">O</span>
      <span class="d-char" data-i="5">V</span>
      <span class="d-char" data-i="6">E</span>
      <span class="d-char" data-i="7">R</span>
      <span class="d-char" data-i="8">Y</span>
    </div>
  </div>
  <div class="hero-cursor" id="hero-cursor">
    <div class="cur-dot"></div>
    <div class="cur-cross cur-top"></div>
    <div class="cur-cross cur-bottom"></div>
    <div class="cur-cross cur-left"></div>
    <div class="cur-cross cur-right"></div>
  </div>
  <div class="whiteout-overlay" id="whiteout"></div>
</section>
<!-- ===== HERO SECTION END ===== -->

<style>
/* ===== HERO CSS START ===== */
#scene-1 {
  position: relative;
  width: 100vw;
  height: 100vh;
  background: #000;
  overflow: hidden;
  cursor: none;
}

#hero-canvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: block;
}

.hero-text-layer {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  z-index: 10;
}

.discovery-wrap {
  display: flex;
  gap: 0.04em;
  letter-spacing: 0.18em;
  clip-path: inset(0 100% 0 0);
}

.d-char {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: clamp(3rem, 8vw, 7rem);
  font-weight: 200;
  color: #ffffff;
  text-shadow:
    0 0 20px #6366f1,
    0 0 60px #6366f1,
    0 0 120px #a78bfa;
  display: inline-block;
  opacity: 0;
  transform: translateZ(0px) scale(0.6);
  will-change: transform, opacity;
}

/* Cursor */
.hero-cursor {
  position: fixed;
  top: 0; left: 0;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: transform 0.05s linear;
}

.cur-dot {
  position: absolute;
  width: 3px; height: 3px;
  background: #22d3ee;
  border-radius: 50%;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}

.cur-cross {
  position: absolute;
  background: rgba(167, 139, 250, 0.6);
}

.cur-top, .cur-bottom {
  width: 1px;
  height: 8px;
  left: 50%;
  transform: translateX(-50%);
}
.cur-left, .cur-right {
  width: 8px;
  height: 1px;
  top: 50%;
  transform: translateY(-50%);
}

.cur-top    { bottom: calc(50% + 4px); }
.cur-bottom { top: calc(50% + 4px); }
.cur-left   { right: calc(50% + 4px); }
.cur-right  { left: calc(50% + 4px); }

.hero-cursor.hovered .cur-top,
.hero-cursor.hovered .cur-bottom,
.hero-cursor.hovered .cur-left,
.hero-cursor.hovered .cur-right {
  transform: rotate(45deg);
}
.hero-cursor.hovered .cur-top    { transform: translateX(-50%) rotate(45deg); }
.hero-cursor.hovered .cur-bottom { transform: translateX(-50%) rotate(45deg); }
.hero-cursor.hovered .cur-left   { transform: translateY(-50%) rotate(45deg); }
.hero-cursor.hovered .cur-right  { transform: translateY(-50%) rotate(45deg); }

.hero-cursor.clicked .cur-dot {
  transform: translate(-50%, -50%) scale(2);
}

.whiteout-overlay {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: #22d3ee;
  opacity: 0;
  pointer-events: none;
  z-index: 20;
}
/* ===== HERO CSS END ===== */
</style>

<script>
// ===== HERO JS START =====
(function() {
  'use strict';

  const canvas = document.getElementById('hero-canvas');
  const section = document.getElementById('scene-1');

  // ── Renderer ─────────────────────────────────────────────────────────────
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000000, 1);
  renderer.outputEncoding = THREE.sRGBEncoding;

  // ── Scene & Camera ────────────────────────────────────────────────────────
  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x000000, 0.18);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 0, 12);

  // ── Post-process (manual bloom via additive pass) ─────────────────────────
  // We'll do a simple bloom via UnrealBloomPass-like approach using two render targets
  // and a custom composite shader, all without EffectComposer dependency.

  const RT_PARAMS = {
    minFilter: THREE.LinearFilter,
    magFilter: THREE.LinearFilter,
    format: THREE.RGBAFormat,
    type: THREE.HalfFloatType
  };

  const rtMain   = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight, RT_PARAMS);
  const rtBloom1 = new THREE.WebGLRenderTarget(window.innerWidth / 2, window.innerHeight / 2, RT_PARAMS);
  const rtBloom2 = new THREE.WebGLRenderTarget(window.innerWidth / 2, window.innerHeight / 2, RT_PARAMS);

  // Fullscreen quad geometry
  const quadGeo = new THREE.PlaneGeometry(2, 2);

  // Bloom threshold + extract shader
  const bloomExtractMat = new THREE.ShaderMaterial({
    uniforms: {
      tDiffuse: { value: rtMain.texture },
      threshold: { value: 0.25 }
    },
    vertexShader: `
      varying vec2 vUv;
      void main() { vUv = uv; gl_Position = vec4(position, 1.0); }
    `,
    fragmentShader: `
      uniform sampler2D tDiffuse;
      uniform float threshold;
      varying vec2 vUv;
      void main() {
        vec4 c = texture2D(tDiffuse, vUv);
        float luma = dot(c.rgb, vec3(0.299, 0.587, 0.114));
        float extracted = smoothstep(threshold, threshold + 0.2, luma);
        gl_FragColor = vec4(c.rgb * extracted, 1.0);
      }
    `,
    depthTest: false, depthWrite: false
  });

  // Blur shader (horizontal then vertical)
  const blurHMat = new THREE.ShaderMaterial({
    uniforms: {
      tDiffuse: { value: rtBloom1.texture },
      resolution: { value: new THREE.Vector2(window.innerWidth / 2, window.innerHeight / 2) },
      direction: { value: new THREE.Vector2(1, 0) },
      radius: { value: 2.0 }
    },
    vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position, 1.0); }`,
    fragmentShader: `
      uniform sampler2D tDiffuse;
      uniform vec2 resolution;
      uniform vec2 direction;
      uniform float radius;
      varying vec2 vUv;
      void main() {
        vec2 texelSize = radius / resolution;
        vec4 col = vec4(0.0);
        float weights[9];
        weights[0]=0.0625; weights[1]=0.125; weights[2]=0.0625;
        weights[3]=0.125;  weights[4]=0.25;  weights[5]=0.125;
        weights[6]=0.0625; weights[7]=0.125; weights[8]=0.0625;
        int idx = 0;
        for(int i=-1; i<=1; i++) {
          for(int j=-1; j<=1; j++) {
            vec2 offset = vec2(float(i), float(j)) * texelSize * direction;
            col += texture2D(tDiffuse, vUv + offset) * weights[idx];
            idx++;
          }
        }
        gl_FragColor = col;
      }
    `,
    depthTest: false, depthWrite: false
  });

  const blurVMat = blurHMat.clone();
  blurVMat.uniforms.tDiffuse = { value: rtBloom2.texture };
  blurVMat.uniforms.direction = { value: new THREE.Vector2(0, 1) };

  // Composite shader
  const compositeMat = new THREE.ShaderMaterial({
    uniforms: {
      tBase:  { value: rtMain.texture },
      tBloom: { value: rtBloom2.texture },
      bloomStrength: { value: 0.0 }
    },
    vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position, 1.0); }`,
    fragmentShader: `
      uniform sampler2D tBase;
      uniform sampler2D tBloom;
      uniform float bloomStrength;
      varying vec2 vUv;
      void main() {
        vec4 base  = texture2D(tBase, vUv);
        vec4 bloom = texture2D(tBloom, vUv);
        gl_FragColor = vec4(base.rgb + bloom.rgb * bloomStrength, 1.0);
      }
    `,
    depthTest: false, depthWrite: false
  });

  // Orthographic camera + scene for fullscreen passes
  const orthoCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
  const orthoScene  = new THREE.Scene();
  const quadMesh    = new THREE.Mesh(quadGeo, bloomExtractMat);
  orthoScene.add(quadMesh);

  // ── Rock Slab geometry (vertex displaced) ────────────────────────────────
  // Noise helper (simple 3D value noise via hash)
  function hash(n) {
    return (Math.sin(n) * 43758.5453123 % 1 + 1) % 1;
  }
  function noise3(x, y, z) {
    const ix = Math.floor(x), iy = Math.floor(y), iz = Math.floor(z);
    const fx = x - ix, fy = y - iy, fz = z - iz;
    const ux = fx * fx * (3 - 2 * fx);
    const uy = fy * fy * (3 - 2 * fy);
    const uz = fz * fz * (3 - 2 * fz);
    const n000 = hash(ix + iy * 57 + iz * 113);
    const n100 = hash(ix + 1 + iy * 57 + iz * 113);
    const n010 = hash(ix + (iy + 1) * 57 + iz * 113);
    const n110 = hash(ix + 1 + (iy + 1) * 57 + iz * 113);
    const n001 = hash(ix + iy * 57 + (iz + 1) * 113);
    const n101 = hash(ix + 1 + iy * 57 + (iz + 1) * 113);
    const n011 = hash(ix + (iy + 1) * 57 + (iz + 1) * 113);
    const n111 = hash(ix + 1 + (iy + 1) * 57 + (iz + 1) * 113);
    return (
      n000 * (1 - ux) * (1 - uy) * (1 - uz) +
      n100 * ux * (1 - uy) * (1 - uz) +
      n010 * (1 - ux) * uy * (1 - uz) +
      n110 * ux * uy * (1 - uz) +
      n001 * (1 - ux) * (1 - uy) * uz +
      n101 * ux * (1 - uy) * uz +
      n011 * (1 - ux) * uy * uz +
      n111 * ux * uy * uz
    );
  }

  function buildSlab(side) {
    // side: -1 = left, +1 = right
    const W = 14, H = 20, segW = 60, segH = 80;
    const geo = new THREE.PlaneGeometry(W, H, segW, segH);
    const pos = geo.attributes.position;

    for (let i = 0; i < pos.count; i++) {
      const x = pos.getX(i);
      const y = pos.getY(i);
      const z = pos.getZ(i);

      // Displacement noise (amp 0.4)
      const n = noise3(x * 0.4 + 3.7, y * 0.3 + 1.2, z * 0.5 + 0.8) * 2 - 1;
      const disp = n * 0.4;

      // Push face normal (z axis) by disp
      pos.setZ(i, z + disp);

      // Shape the inner edge: make it jagged
      const edgeProximity = 1.0 - Math.min(Math.abs(x) / (W / 2), 1.0);
      const jagged = noise3(y * 1.5 + 10, x * 2.0, 5.0) * 0.3;
      pos.setX(i, x + jagged * edgeProximity * side * -0.3);
    }
    geo.computeVertexNormals();
    return geo;
  }

  // Slab material: dark rock with emissive veins
  const slabVertexShader = `
    varying vec2 vUv;
    varying vec3 vNormal;
    varying vec3 vWorldPos;
    void main() {
      vUv = uv;
      vNormal = normalize(normalMatrix * normal);
      vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `;

  const slabFragmentShader = `
    precision highp float;
    uniform float uTime;
    uniform float uVeinBrightness;
    uniform vec3 uSide; // +1 or -1 for left/right
    varying vec2 vUv;
    varying vec3 vNormal;
    varying vec3 vWorldPos;

    float hash(float n) { return fract(sin(n) * 43758.5453123); }
    float noise(vec2 p) {
      vec2 i = floor(p); vec2 f = fract(p);
      f = f * f * (3.0 - 2.0 * f);
      float a = hash(i.x + i.y * 57.0);
      float b = hash(i.x + 1.0 + i.y * 57.0);
      float c = hash(i.x + (i.y + 1.0) * 57.0);
      float d = hash(i.x + 1.0 + (i.y + 1.0) * 57.0);
      return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
    }
    float fbm(vec2 p) {
      float v = 0.0;
      v += 0.5000 * noise(p);
      v += 0.2500 * noise(p * 2.0);
      v += 0.1250 * noise(p * 4.0);
      v += 0.0625 * noise(p * 8.0);
      return v;
    }

    void main() {
      // Base rock color: very dark
      float rockNoise = fbm(vUv * 6.0 + 1.3);
      vec3 rockColor = mix(vec3(0.03, 0.03, 0.04), vec3(0.12, 0.10, 0.13), rockNoise);

      // Emissive veins near the inner edge (U=1 for right slab, U=0 for left)
      float edgeU = uSide.x > 0.0 ? vUv.x : (1.0 - vUv.x);
      float veinMask = pow(edgeU, 3.0);

      // Vein pattern
      float veinNoise = fbm(vUv * vec2(2.0, 8.0) + vec2(uTime * 0.05, 0.0));
      float vein = pow(veinNoise, 2.5) * veinMask;

      // Pulse oscillation
      float pulse = 0.65 + 0.35 * sin(uTime * (3.14159 * 2.0 / 0.8));

      vec3 veinColor = vec3(0.388, 0.400, 0.945) * vein * uVeinBrightness * pulse * 3.0;

      // Fresnel-ish edge
      float fresnel = 1.0 - abs(dot(vNormal, vec3(0.0, 0.0, 1.0)));
      vec3 fresnelColor = vec3(0.388, 0.400, 0.945) * pow(fresnel, 4.0) * uVeinBrightness * 0.5;

      gl_FragColor = vec4(rockColor + veinColor + fresnelColor, 1.0);
    }
  `;

  // Build two slabs
  const slabGeoL = buildSlab(-1);
  const slabGeoR = buildSlab(+1);

  const slabMatL = new THREE.ShaderMaterial({
    uniforms: {
      uTime:           { value: 0.0 },
      uVeinBrightness: { value: 0.3 },
      uSide:           { value: new THREE.Vector3(-1, 0, 0) }
    },
    vertexShader: slabVertexShader,
    fragmentShader: slabFragmentShader
  });
  const slabMatR = slabMatL.clone();
  slabMatR.uniforms.uSide = { value: new THREE.Vector3(+1, 0, 0) };
  slabMatR.uniforms.uVeinBrightness = { value: 0.3 };
  slabMatR.uniforms.uTime = { value: 0.0 };

  const slabL = new THREE.Mesh(slabGeoL, slabMatL);
  const slabR = new THREE.Mesh(slabGeoR, slabMatR);

  // Initial positions: gap = 0.02 so slabs nearly touching center
  // Left slab: center at x = -(W/2 + gap/2) = -(7 + 0.01) = -7.01
  const HALF_W = 7;
  slabL.position.set(-HALF_W - 0.01, 0, 0);
  slabR.position.set( HALF_W + 0.01, 0, 0);

  scene.add(slabL);
  scene.add(slabR);

  // ── Fissure glow line (thin vertical line in world space) ────────────────
  const fissureGeo = new THREE.PlaneGeometry(0.018, 22);
  const fissureMat = new THREE.ShaderMaterial({
    uniforms: {
      uTime:       { value: 0.0 },
      uBrightness: { value: 1.0 },
      uWidth:      { value: 1.0 }
    },
    vertexShader: `
      varying vec2 vUv;
      void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
    `,
    fragmentShader: `
      precision highp float;
      uniform float uTime;
      uniform float uBrightness;
      uniform float uWidth;
      varying vec2 vUv;
      void main() {
        float cx = abs(vUv.x - 0.5) * 2.0;
        float glow = exp(-cx * cx * 30.0 / uWidth);
        float flicker = 0.85 + 0.15 * sin(uTime * 12.7 + vUv.y * 8.3);
        vec3 color = vec3(0.388, 0.400, 0.945);
        gl_FragColor = vec4(color * glow * flicker * uBrightness, glow * uBrightness);
      }
    `,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });
  const fissureMesh = new THREE.Mesh(fissureGeo, fissureMat);
  fissureMesh.position.set(0, 0, 0.05);
  scene.add(fissureMesh);

  // Interior glow (radial gradient inside fissure)
  const interiorGeo = new THREE.PlaneGeometry(0.04, 22);
  const interiorMat = new THREE.ShaderMaterial({
    uniforms: {
      uTime:   { value: 0.0 },
      uAlpha:  { value: 0.0 },
      uWidth:  { value: 1.0 }
    },
    vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
    fragmentShader: `
      precision highp float;
      uniform float uTime;
      uniform float uAlpha;
      uniform float uWidth;
      varying vec2 vUv;
      void main() {
        float cx = abs(vUv.x - 0.5) * 2.0;
        float glow = 1.0 - cx;
        glow = pow(glow, 1.5);
        float pulse = 0.7 + 0.3 * sin(uTime * 7.9);
        vec3 col = mix(vec3(0.388, 0.4, 0.945), vec3(0.133, 0.827, 0.933), cx);
        gl_FragColor = vec4(col * glow * pulse * uWidth * 2.0, glow * uAlpha * uWidth);
      }
    `,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });
  const interiorMesh = new THREE.Mesh(interiorGeo, interiorMat);
  interiorMesh.position.set(0, 0, 0.03);
  scene.add(interiorMesh);

  // Particles inside fissure
  const PARTICLE_COUNT = 800;
  const particleGeo = new THREE.BufferGeometry();
  const pPositions = new Float32Array(PARTICLE_COUNT * 3);
  const pSeeds     = new Float32Array(PARTICLE_COUNT);

  for (let i = 0; i < PARTICLE_COUNT; i++) {
    pPositions[i * 3]     = (Math.random() - 0.5) * 0.08;
    pPositions[i * 3 + 1] = (Math.random() - 0.5) * 20;
    pPositions[i * 3 + 2] = (Math.random() - 0.5) * 2 + 0.1;
    pSeeds[i] = Math.random() * 6.28;
  }

  particleGeo.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
  particleGeo.setAttribute('seed',     new THREE.BufferAttribute(pSeeds, 1));

  const particleMat = new THREE.ShaderMaterial({
    uniforms: {
      uTime:   { value: 0.0 },
      uAlpha:  { value: 0.0 },
      uGapHalf: { value: 0.01 },
      uSize:   { value: window.devicePixelRatio * 2.5 }
    },
    vertexShader: `
      attribute float seed;
      uniform float uTime;
      uniform float uGapHalf;
      uniform float uSize;
      varying float vAlpha;
      void main() {
        vec3 pos = position;
        float t = mod(uTime * 0.4 + seed, 1.0);
        pos.y = mix(-10.0, 10.0, t);
        float drift = sin(uTime * 2.3 + seed * 7.1) * 0.015;
        pos.x = clamp(pos.x + drift, -uGapHalf * 0.8, uGapHalf * 0.8);
        vAlpha = 1.0 - abs(t * 2.0 - 1.0);
        gl_PointSize = uSize * vAlpha;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
      }
    `,
    fragmentShader: `
      varying float vAlpha;
      void main() {
        float d = length(gl_PointCoord - vec2(0.5));
        if(d > 0.5) discard;
        float alpha = (1.0 - d * 2.0) * vAlpha;
        gl_FragColor = vec4(0.388, 0.776, 1.0, alpha);
      }
    `,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });

  const particles = new THREE.Points(particleGeo, particleMat);
  scene.add(particles);

  // ── Animation State ───────────────────────────────────────────────────────
  const state = {
    gapHalf: 0.01,       // half-width of fissure gap
    bloomStrength: 0.2,
    veinBrightness: 0.3,
    cameraZ: 12,
    particleAlpha: 0.0,
    textClip: 0.0,       // 0→1 reveals text
    textPhase: 0,        // 0=hidden, 1=revealing, 2=scattered, 3=reassembled
    interiorAlpha: 0.0
  };

  // Character refs for GSAP
  const chars = document.querySelectorAll('.d-char');
  const discoveryWrap = document.getElementById('discovery-wrap');
  const whiteout = document.getElementById('whiteout');

  // ── Timeline ──────────────────────────────────────────────────────────────
  const tl = gsap.timeline({ onComplete: () => {} });

  // 0→2s: Fissure cracks open. Slab separation: gap 0.01 → 1.5 (each side)
  // Camera starts at z=12
  // Vein brightness 0.3 → 1.0
  // Bloom 0.2 → 0.9

  tl.to(state, {
    duration: 2.0,
    gapHalf: 1.5,
    bloomStrength: 0.9,
    veinBrightness: 1.0,
    particleAlpha: 1.0,
    interiorAlpha: 1.0,
    ease: 'power2.inOut'
  }, 0);

  // Text reveal: stagger chars at t=2s
  // Each char: opacity 0→1, scale 0.6→1, clip revealed
  tl.call(() => {
    // Reveal clip-path on wrap
    gsap.to(discoveryWrap, {
      duration: 0.0,
      'clip-path': 'inset(0 0% 0 0)'
    });
    chars.forEach((ch, i) => {
      gsap.to(ch, {
        delay: i * 0.15,
        duration: 0.4,
        opacity: 1,
        scale: 1,
        y: 0,
        ease: 'power3.out'
      });
      gsap.fromTo(ch, {
        y: 30
      }, {
        delay: i * 0.15,
        duration: 0.4,
        y: 0,
        ease: 'power3.out'
      });
    });
  }, [], 2.0);

  // 2→4s: Camera dolly punch-through z=12 → z=-8
  tl.to(state, {
    duration: 2.0,
    cameraZ: -8,
    ease: 'power3.in'
  }, 2.0);

  // At t=2.5s: scatter chars on z-axis (CSS 3D)
  tl.call(() => {
    chars.forEach((ch, i) => {
      const zDist = (Math.random() - 0.5) * 8; // ±4
      const xDrift = (Math.random() - 0.5) * 60;
      const yDrift = (Math.random() - 0.5) * 40;
      gsap.to(ch, {
        duration: 1.5,
        z: zDist * 100 + 'px', // CSS perspective z
        x: xDrift,
        y: yDrift,
        opacity: 0.3,
        ease: 'power2.in'
      });
    });
    // perspective on wrap
    gsap.set(discoveryWrap, { perspective: 800, transformStyle: 'preserve-3d' });
  }, [], 2.5);

  // 3.5→4s: Gap continues opening fast
  tl.to(state, {
    duration: 0.5,
    gapHalf: 8.0,
    ease: 'power4.in'
  }, 3.5);

  // At t=4s: whiteout flash
  tl.to(whiteout, {
    duration: 0.15,
    opacity: 0.95,
    ease: 'power2.in'
  }, 4.0);

  tl.to(whiteout, {
    duration: 0.4,
    opacity: 0,
    ease: 'power2.out'
  }, 4.15);

  // At t=5s: reassemble chars
  tl.call(() => {
    chars.forEach((ch, i) => {
      gsap.to(ch, {
        duration: 0.6,
        z: '0px',
        x: 0,
        y: 0,
        opacity: 1,
        ease: 'power2.out'
      });
    });
    // Add cyan glow to chars after reassembly
    gsap.to(chars, {
      duration: 0.4,
      delay: 0.3,
      textShadow: '0 0 20px #22d3ee, 0 0 60px #22d3ee, 0 0 120px #22d3ee',
      ease: 'power2.out'
    });
  }, [], 4.55);

  // ── Resize ────────────────────────────────────────────────────────────────
  window.addEventListener('resize', () => {
    const W = window.innerWidth, H = window.innerHeight;
    camera.aspect = W / H;
    camera.updateProjectionMatrix();
    renderer.setSize(W, H);
    rtMain.setSize(W, H);
    rtBloom1.setSize(W / 2, H / 2);
    rtBloom2.setSize(W / 2, H / 2);
    blurHMat.uniforms.resolution.value.set(W / 2, H / 2);
    blurVMat.uniforms.resolution.value.set(W / 2, H / 2);
  });

  // ── Cursor ────────────────────────────────────────────────────────────────
  const cursorEl = document.getElementById('hero-cursor');
  let mouseX = -200, mouseY = -200;
  let curX = -200, curY = -200;

  document.addEventListener('mousemove', e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });

  document.addEventListener('mouseenter', e => {
    if (e.target !== document) return;
  });

  section.addEventListener('mouseenter', () => cursorEl.style.opacity = '1');
  section.addEventListener('mouseleave', () => cursorEl.style.opacity = '0');

  section.addEventListener('click', () => {
    cursorEl.classList.add('clicked');
    setTimeout(() => cursorEl.classList.remove('clicked'), 150);
  });

  // Hover detection on interactive elements
  document.querySelectorAll('a, button, [role="button"]').forEach(el => {
    el.addEventListener('mouseenter', () => cursorEl.classList.add('hovered'));
    el.addEventListener('mouseleave', () => cursorEl.classList.remove('hovered'));
  });

  // ── Render Loop ───────────────────────────────────────────────────────────
  const clock = new THREE.Clock();
  let animFrame;

  function renderBloom() {
    // 1. Render scene to main RT
    renderer.setRenderTarget(rtMain);
    renderer.render(scene, camera);

    // 2. Extract bright regions → bloom1
    quadMesh.material = bloomExtractMat;
    bloomExtractMat.uniforms.tDiffuse.value = rtMain.texture;
    renderer.setRenderTarget(rtBloom1);
    renderer.render(orthoScene, orthoCamera);

    // 3. Blur H → bloom2
    quadMesh.material = blurHMat;
    blurHMat.uniforms.tDiffuse.value = rtBloom1.texture;
    renderer.setRenderTarget(rtBloom2);
    renderer.render(orthoScene, orthoCamera);

    // 4. Blur V → bloom1
    quadMesh.material = blurVMat;
    blurVMat.uniforms.tDiffuse.value = rtBloom2.texture;
    renderer.setRenderTarget(rtBloom1);
    renderer.render(orthoScene, orthoCamera);

    // 5. Composite to screen
    quadMesh.material = compositeMat;
    compositeMat.uniforms.tBase.value  = rtMain.texture;
    compositeMat.uniforms.tBloom.value = rtBloom1.texture;
    compositeMat.uniforms.bloomStrength.value = state.bloomStrength;
    renderer.setRenderTarget(null);
    renderer.render(orthoScene, orthoCamera);
  }

  function animate() {
    animFrame = requestAnimationFrame(animate);

    const elapsed = clock.getElapsedTime();

    // Cursor lerp
    curX += (mouseX - curX) * 0.12;
    curY += (mouseY - curY) * 0.12;
    cursorEl.style.transform = `translate(${curX}px, ${curY}px) translate(-50%, -50%)`;

    // Update camera Z from state
    camera.position.z = state.cameraZ;

    // Update slab positions
    slabL.position.x = -HALF_W - state.gapHalf;
    slabR.position.x =  HALF_W + state.gapHalf;

    // Update shader uniforms
    slabMatL.uniforms.uTime.value           = elapsed;
    slabMatL.uniforms.uVeinBrightness.value  = state.veinBrightness;
    slabMatR.uniforms.uTime.value           = elapsed;
    slabMatR.uniforms.uVeinBrightness.value  = state.veinBrightness;

    fissureMat.uniforms.uTime.value         = elapsed;
    fissureMat.uniforms.uWidth.value        = Math.min(state.gapHalf / 1.5, 2.0);
    fissureMat.uniforms.uBrightness.value   = Math.min(state.veinBrightness * 1.2, 2.0);

    interiorMat.uniforms.uTime.value        = elapsed;
    interiorMat.uniforms.uAlpha.value       = state.interiorAlpha;
    interiorMat.uniforms.uWidth.value       = Math.min(state.gapHalf, 3.0);

    // Scale fissure mesh with gap
    fissureMesh.scale.x = Math.max(state.gapHalf / 0.01, 1);
    interiorMesh.scale.x = Math.max(state.gapHalf * 3, 1);

    particleMat.uniforms.uTime.value        = elapsed;
    particleMat.uniforms.uAlpha.value       = state.particleAlpha * Math.min(1, state.gapHalf * 0.8);
    particleMat.uniforms.uGapHalf.value     = state.gapHalf * 0.5;

    // Adjust particle x-range to gap width
    const pPos = particleGeo.attributes.position;
    // Only update a few per frame for perf
    const updateCount = 20;
    const startIdx = Math.floor((elapsed * 100) % (PARTICLE_COUNT / updateCount)) * updateCount;
    for (let i = startIdx; i < Math.min(startIdx + updateCount, PARTICLE_COUNT); i++) {
      pPos.setX(i, (Math.random() - 0.5) * state.gapHalf * 1.5);
    }
    pPos.needsUpdate = true;

    renderBloom();
  }

  animate();

  // Cleanup on potential SPA unmount
  if (typeof window._heroCleanup === 'function') window._heroCleanup();
  window._heroCleanup = () => {
    cancelAnimationFrame(animFrame);
    tl.kill();
    renderer.dispose();
  };

})();
// ===== HERO JS END =====
</script>

</body>
</html>
