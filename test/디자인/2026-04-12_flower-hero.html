<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bloom — 3D Procedural Flower</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,200;0,300;1,200&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; cursor:none; }

    html, body {
      width:100%; height:100%; overflow:hidden;
      background: radial-gradient(ellipse at 50% 55%, #1a0a24 0%, #0a0510 50%, #000 100%);
    }

    #canvas-container { position:fixed; inset:0; z-index:1; }
    canvas { display:block; }

    /* grain */
    #grain { position:fixed; inset:0; pointer-events:none; z-index:3; }

    /* hero text */
    #ui {
      position:fixed; inset:0; z-index:5; pointer-events:none;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding-top: 54vh;          /* below the flower */
    }
    #label {
      font-family:'Inter',sans-serif;
      font-size:clamp(0.45rem,0.8vw,0.58rem);
      letter-spacing:0.55em; color:rgba(220,140,200,0.55);
      text-transform:uppercase; opacity:0; margin-bottom:0.9rem;
    }
    #title {
      font-family:'Cormorant Garamond',serif;
      font-size:clamp(3rem,10vw,7.5rem);
      font-weight:200; font-style:italic;
      color:#fff; letter-spacing:0.12em; line-height:1;
      opacity:0; transform:translateY(24px);
      text-shadow: 0 0 80px rgba(200,80,180,0.35), 0 0 160px rgba(120,0,180,0.2);
    }
    #sub {
      margin-top:1.1rem;
      font-family:'Inter',sans-serif;
      font-size:clamp(0.75rem,1.4vw,0.88rem);
      font-weight:300; color:rgba(255,255,255,0.32);
      letter-spacing:0.1em; opacity:0; transform:translateY(10px);
      text-align:center;
    }
    #cta {
      margin-top:2.2rem;
      padding:0.75rem 2.2rem; background:transparent;
      border:1px solid rgba(200,120,200,0.35);
      color:rgba(220,150,210,0.85);
      font-family:'Inter',sans-serif;
      font-size:0.62rem; letter-spacing:0.4em; text-transform:uppercase;
      pointer-events:all; opacity:0; transform:translateY(10px);
      transition:background 0.3s, border-color 0.3s;
    }
    #cta:hover { background:rgba(160,80,160,0.12); border-color:rgba(220,150,210,0.7); }

    /* cursor */
    #cursor      { position:fixed; width:4px; height:4px; background:rgba(220,150,200,0.9);
                   border-radius:50%; pointer-events:none; z-index:9999; transform:translate(-50%,-50%); }
    #cursor-ring { position:fixed; width:26px; height:26px;
                   border:1px solid rgba(180,100,180,0.3); border-radius:50%;
                   pointer-events:none; z-index:9998; transform:translate(-50%,-50%); }
  </style>
</head>
<body>

<div id="canvas-container"></div>

<svg id="grain" width="100%" height="100%">
  <filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="4" seed="11"/>
  <feDisplacementMap in="SourceGraphic" scale="1"/></filter>
  <rect width="100%" height="100%" filter="url(#n)" opacity="0.035"/>
</svg>

<div id="ui">
  <div id="label">Procedural Flora</div>
  <div id="title">Bloom</div>
  <div id="sub">A moment before the petals open.<br>Move your cursor to let light follow.</div>
  <button id="cta">Enter</button>
</div>

<div id="cursor"></div>
<div id="cursor-ring"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<script>
// ════════════════════════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════════════════════════
const CONFIG = {
  CAMERA:   { fov:45, pos:[0, 0.4, 5.5], near:0.1, far:100 },
  ROTATE:   { speed: 0.18 },     // rad/sec
  FLOAT:    { height:0.08, speed:0.75 },
  PARALLAX: { camX:0.55, camY:0.28, lightX:2.5, lightY:2.0, smooth:0.05 },

  LIGHT: {
    ambient: { color:0x1a0a2e, intensity:1.2 },
    hemi:    { sky:0x2d0a40, ground:0x000000, intensity:0.6 },
    key:     { color:0xff80c0, intensity:5.5, pos:[ 3, 4,  3] },
    fill:    { color:0x6633ff, intensity:1.8, pos:[-4, 2, -2] },
    rim:     { color:0xffaa44, intensity:1.2, pos:[ 0,-2, -5] },
  },

  // 꽃 레이어 정의 (안→밖 순서)
  LAYERS: [
    // innermost — cream/pale
    { count:6,  radius:0.10, tilt: Math.PI*0.18, w:0.11, l:0.42,
      color:0xfff0e8, emissive:0xff9988, emInt:0.55, delay:1.4 },
    // inner — soft pink
    { count:9,  radius:0.17, tilt: Math.PI*0.30, w:0.16, l:0.60,
      color:0xf0a0d0, emissive:0xcc2288, emInt:0.38, delay:0.95 },
    // middle — bright magenta
    { count:11, radius:0.25, tilt: Math.PI*0.42, w:0.20, l:0.78,
      color:0xd050c0, emissive:0x990088, emInt:0.32, delay:0.55 },
    // outer — deep violet
    { count:13, radius:0.33, tilt: Math.PI*0.52, w:0.24, l:0.92,
      color:0x7a22cc, emissive:0x3d0080, emInt:0.28, delay:0.2  },
  ],

  PARTICLES: { count:260, spread:26, size:0.045, color:0xaa88cc, opacity:0.4 },
};
// ════════════════════════════════════════════════════════════

const container = document.getElementById('canvas-container');
const W = () => window.innerWidth;
const H = () => window.innerHeight;

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(W(), H());
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.outputEncoding = THREE.sRGBEncoding;
container.appendChild(renderer.domElement);

// Scene + Camera
const scene  = new THREE.Scene();
scene.fog    = new THREE.FogExp2(0x0a0510, 0.022);

const camera = new THREE.PerspectiveCamera(CONFIG.CAMERA.fov, W()/H(), CONFIG.CAMERA.near, CONFIG.CAMERA.far);
const CAM_BASE = { x:CONFIG.CAMERA.pos[0], y:CONFIG.CAMERA.pos[1], z:CONFIG.CAMERA.pos[2] };
camera.position.set(...CONFIG.CAMERA.pos);

// Lights
scene.add(new THREE.AmbientLight(CONFIG.LIGHT.ambient.color, CONFIG.LIGHT.ambient.intensity));
scene.add(new THREE.HemisphereLight(CONFIG.LIGHT.hemi.sky, CONFIG.LIGHT.hemi.ground, CONFIG.LIGHT.hemi.intensity));

const keyLight = new THREE.DirectionalLight(CONFIG.LIGHT.key.color, CONFIG.LIGHT.key.intensity);
keyLight.position.set(...CONFIG.LIGHT.key.pos);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(1024, 1024);
scene.add(keyLight);

const fillLight = new THREE.PointLight(CONFIG.LIGHT.fill.color, CONFIG.LIGHT.fill.intensity, 20);
fillLight.position.set(...CONFIG.LIGHT.fill.pos);
scene.add(fillLight);

const rimLight = new THREE.PointLight(CONFIG.LIGHT.rim.color, CONFIG.LIGHT.rim.intensity, 16);
rimLight.position.set(...CONFIG.LIGHT.rim.pos);
scene.add(rimLight);

// Background particles
const pGeo = new THREE.BufferGeometry();
const pArr = new Float32Array(CONFIG.PARTICLES.count * 3);
for (let i = 0; i < CONFIG.PARTICLES.count * 3; i++) pArr[i] = (Math.random() - 0.5) * CONFIG.PARTICLES.spread;
pGeo.setAttribute('position', new THREE.BufferAttribute(pArr, 3));
scene.add(new THREE.Points(pGeo, new THREE.PointsMaterial({
  color:CONFIG.PARTICLES.color, size:CONFIG.PARTICLES.size,
  transparent:true, opacity:CONFIG.PARTICLES.opacity,
  sizeAttenuation:true, depthWrite:false,
})));

// ── 꽃 생성 ───────────────────────────────────────────────
function makePetalGeo(w, l) {
  const s = new THREE.Shape(), h = w * 0.5;
  // 기저(0,0)에서 끝(0,l)으로 이어지는 꽃잎 bezier 외곽선
  s.moveTo(0, 0);
  s.bezierCurveTo( h,       l*0.18,   h*1.06,  l*0.52,  h*0.38,  l*0.80);
  s.bezierCurveTo( h*0.14,  l*0.95,   0,       l,       0,       l);
  s.bezierCurveTo( 0,       l,       -h*0.14,  l*0.95, -h*0.38,  l*0.80);
  s.bezierCurveTo(-h*1.06,  l*0.52,  -h,       l*0.18,  0,       0);

  return new THREE.ExtrudeGeometry(s, {
    depth:0.014, bevelEnabled:true,
    bevelThickness:0.009, bevelSize:0.005, bevelSegments:4,
  });
}

function addLayer(parent, cfg) {
  const geo = makePetalGeo(cfg.w, cfg.l);

  for (let i = 0; i < cfg.count; i++) {
    const pivot = new THREE.Group();
    pivot.rotation.y = (i / cfg.count) * Math.PI * 2;

    const mesh = new THREE.Mesh(geo, new THREE.MeshPhysicalMaterial({
      color:           cfg.color,
      emissive:        cfg.emissive,
      emissiveIntensity: cfg.emInt,
      roughness:       0.05,
      metalness:       0.08,
      clearcoat:       0.9,        // 광택 코팅
      clearcoatRoughness: 0.08,
      side:            THREE.DoubleSide,
    }));

    mesh.position.z = cfg.radius;  // 중심에서 바깥으로
    mesh.rotation.x = 0;           // 시작: 닫힌 봉오리 (수직)
    mesh.castShadow = true;

    pivot.add(mesh);
    parent.add(pivot);

    // 꽃 피어나기 애니메이션
    gsap.to(mesh.rotation, {
      x: cfg.tilt,
      duration: 2.4,
      delay: cfg.delay + i * 0.065,
      ease: 'power2.inOut',
    });
  }
}

const flower = new THREE.Group();

// 레이어 추가 (바깥→안 순으로 bloom 시작)
CONFIG.LAYERS.forEach(layer => addLayer(flower, layer));

// 수술 (stamen) — 중심부 작은 구들
for (let i = 0; i < 18; i++) {
  const angle  = (i / 18) * Math.PI * 2;
  const r      = 0.05 + Math.random() * 0.045;
  const height = 0.03 + Math.random() * 0.05;
  const m      = new THREE.Mesh(
    new THREE.SphereGeometry(0.014 + Math.random() * 0.008, 8, 8),
    new THREE.MeshStandardMaterial({
      color: 0xffee88, emissive: 0xffcc00, emissiveIntensity: 1.4,
      roughness: 0.0, metalness: 0.9,
    })
  );
  m.position.set(Math.sin(angle)*r, height, Math.cos(angle)*r);
  flower.add(m);
}

// 코어 구 (발광)
const coreMesh = new THREE.Mesh(
  new THREE.SphereGeometry(0.06, 32, 32),
  new THREE.MeshStandardMaterial({
    color: 0xffffff, emissive: 0xff8800, emissiveIntensity: 2.2,
    roughness: 0.0, metalness: 0.5,
  })
);
flower.add(coreMesh);

// 코어에서 나오는 점 광원
const coreLight = new THREE.PointLight(0xffaa44, 2.5, 4.0);
coreLight.position.set(0, 0.05, 0);
flower.add(coreLight);

// 코어 펄스 애니메이션
gsap.to(coreMesh.material, {
  emissiveIntensity: 3.5, duration: 1.6,
  repeat: -1, yoyo: true, ease: 'sine.inOut',
});
gsap.to(coreLight, {
  intensity: 4.0, duration: 1.6,
  repeat: -1, yoyo: true, ease: 'sine.inOut',
});

// 씬에 추가 + 입장 애니메이션
scene.add(flower);
flower.scale.setScalar(0);
gsap.to(flower.scale, { x:1, y:1, z:1, duration:2.0, ease:'elastic.out(1,0.5)', delay:0.2 });

// 텍스트 등장
const textTl = gsap.timeline({ delay: 1.4 });
textTl.to('#label', { opacity:1, duration:0.9, ease:'power2.out' });
textTl.to('#title', { opacity:1, y:0, duration:1.3, ease:'power3.out' }, '-=0.3');
textTl.to('#sub',   { opacity:1, y:0, duration:0.9, ease:'power2.out' }, '-=0.5');
textTl.to('#cta',   { opacity:1, y:0, duration:0.8, ease:'power2.out' }, '-=0.4');

// ── 마우스 ──
let rawMX=0, rawMY=0, tgtCamX=0, tgtCamY=0, smCamX=0, smCamY=0;
document.addEventListener('mousemove', e => {
  rawMX = (e.clientX/W() - 0.5) * 2;
  rawMY = (e.clientY/H() - 0.5) * 2;
  tgtCamX =  rawMX * CONFIG.PARALLAX.camX;
  tgtCamY = -rawMY * CONFIG.PARALLAX.camY;
});

// 커서
const cursorEl = document.getElementById('cursor');
const cursorRg = document.getElementById('cursor-ring');
let cx=W()/2, cy=H()/2, rx=cx, ry=cy;
document.addEventListener('mousemove', e => { cx=e.clientX; cy=e.clientY; });
setInterval(() => {
  rx += (cx-rx)*0.12; ry += (cy-ry)*0.12;
  cursorEl.style.left=cx+'px'; cursorEl.style.top=cy+'px';
  cursorRg.style.left=rx+'px'; cursorRg.style.top=ry+'px';
}, 16);

// 리사이즈
window.addEventListener('resize', () => {
  camera.aspect = W()/H();
  camera.updateProjectionMatrix();
  renderer.setSize(W(), H());
});

// ── 렌더 루프 ──
const clock  = new THREE.Clock();
let   prevT  = 0;

function animate() {
  requestAnimationFrame(animate);

  const elapsed = clock.getElapsedTime();
  const delta   = elapsed - prevT;
  prevT = elapsed;

  // 꽃 회전 + 부유
  flower.rotation.y += CONFIG.ROTATE.speed * delta;
  flower.position.y  = Math.sin(elapsed * CONFIG.FLOAT.speed) * CONFIG.FLOAT.height;

  // 카메라 패럴랙스
  smCamX += (tgtCamX - smCamX) * CONFIG.PARALLAX.smooth;
  smCamY += (tgtCamY - smCamY) * CONFIG.PARALLAX.smooth;
  camera.position.x = CAM_BASE.x + smCamX;
  camera.position.y = CAM_BASE.y + smCamY;
  camera.lookAt(0, 0.1, 0);

  // 키라이트 마우스 추적
  keyLight.position.x = CONFIG.LIGHT.key.pos[0] + rawMX * CONFIG.PARALLAX.lightX;
  keyLight.position.y = CONFIG.LIGHT.key.pos[1] - rawMY * CONFIG.PARALLAX.lightY;

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
